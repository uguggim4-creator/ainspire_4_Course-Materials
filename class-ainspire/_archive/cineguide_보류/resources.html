<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강생 자료실 | CineGuide</title>
    <meta name="description" content="AInspire 4기 수강생들을 위한 영상 제작 핵심 개념 정리, 입문 가이드, 레퍼런스 사이트 모음 등 실무 자료실.">
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        
:root {
    /* CineGuide 원본 블루/시안/에메랄드/글라스모피즘 스타일 적용 */
    --bg-primary: #080C14;
    --bg-secondary: #0F172A;
    --bg-card: rgba(30, 41, 59, 0.45);
    --border-color: rgba(255, 255, 255, 0.08);
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    
    --accent-cyan: #06B6D4;
    --accent-emerald: #10B981;
    --accent-pink: #EC4899;
    --accent-gold: #F59E0B;
    
    --gradient-accent: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
    --gradient-card-hover: linear-gradient(180deg, rgba(6, 182, 212, 0.15) 0%, rgba(30, 41, 59, 0) 100%);
    --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.3);
    
    --brand-grad: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
    --glow-purple: 0 0 30px rgba(6, 182, 212, 0.25);
    --yellow: #F59E0B;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
}

h1, h2, h3, h4, .brand-font {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
}

.glass {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
}

/* Header Styling */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    transition: all 0.3s ease;
}
header.scrolled {
    background: rgba(8, 12, 20, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
}
.nav-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 2rem;
}
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #fff;
}
.nav-links {
    display: flex;
    list-style: none;
    gap: 2rem;
}
.nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
    padding: 0.25rem 0;
}
.nav-links a:hover, .nav-links a.active {
    color: var(--text-primary);
}
.nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--gradient-accent);
    transition: width 0.3s ease;
}
.nav-links a:hover::after, .nav-links a.active::after {
    width: 100%;
}
.mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    cursor: pointer;
    font-size: 1.5rem;
    padding: 0.5rem;
    align-items: center;
    justify-content: center;
    transition: color 0.3s ease;
    z-index: 1001;
}
.mobile-menu-btn:hover {
    color: var(--accent-cyan);
}

/* Hero Section */
.hero {
    position: relative;
    padding: 10rem 2rem 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    overflow: hidden;
}
.hero-bg-art {
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, rgba(8, 12, 20, 0) 70%);
    z-index: 0;
    pointer-events: none;
}
.hero-bg-art-2 {
    position: absolute;
    top: 20%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, rgba(8, 12, 20, 0) 70%);
    z-index: 0;
    pointer-events: none;
}
.hero-content {
    position: relative;
    z-index: 1;
    max-width: 800px;
}
.session-tag {
    display: inline-block;
    padding: 0.5rem 1.25rem;
    background: rgba(6, 182, 212, 0.15);
    border: 1px solid rgba(6, 182, 212, 0.3);
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent-gold);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
}
.hero-content h1 {
    font-size: 3.2rem;
    line-height: 1.2;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #FFF 30%, var(--accent-cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.03em;
}
.hero-content p {
    font-size: 1.15rem;
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    line-height: 1.7;
}

/* Main Container */
.main-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 8rem;
    position: relative;
    z-index: 2;
}

/* Category Filters */
.filters-container {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 3.5rem;
    flex-wrap: wrap;
}
.filter-btn {
    padding: 0.75rem 1.75rem;
    font-size: 0.95rem;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
}
.filter-btn:hover {
    color: var(--text-primary);
    border-color: rgba(6, 182, 212, 0.35);
    background: rgba(6, 182, 212, 0.1);
}
.filter-btn.active {
    color: #080C14;
    background: var(--brand-grad);
    border-color: transparent;
    box-shadow: var(--glow-cyan);
}

/* Resources Grid */
.resources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2rem;
    width: 100%;
}
.resource-card {
    border-radius: 20px;
    padding: 2.25rem;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 280px;
}
.resource-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gradient-card-hover);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 0;
}
.resource-card:hover {
    transform: translateY(-8px);
    border-color: rgba(6, 182, 212, 0.45);
    box-shadow: var(--glow-cyan);
}
.resource-card:hover::before {
    opacity: 1;
}
.resource-card * {
    position: relative;
    z-index: 1;
}
.card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
}
.card-icon-box {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: rgba(6, 182, 212, 0.15);
    border: 1px solid rgba(6, 182, 212, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-cyan);
    transition: all 0.3s ease;
}
.resource-card:hover .card-icon-box {
    background: var(--accent-cyan);
    color: #080C14;
    box-shadow: var(--glow-cyan);
}
.card-badge {
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.85rem;
    border-radius: 99px;
    background: rgba(255, 230, 0, 0.1);
    border: 1px solid rgba(255, 230, 0, 0.25);
    color: var(--accent-gold);
}
.card-body h3 {
    font-size: 1.4rem;
    color: var(--text-primary);
    margin-bottom: 0.75rem;
    line-height: 1.35;
}
.card-body p {
    font-size: 0.95rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 1.5rem;
}
.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 1.25rem;
    margin-top: auto;
    font-size: 0.82rem;
    color: var(--text-muted);
}
.read-more-btn {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    color: var(--accent-cyan);
    font-weight: 700;
    transition: gap 0.2s ease;
}
.resource-card:hover .read-more-btn {
    gap: 0.6rem;
}

/* Modal Overlay & Details Viewer */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(8, 12, 20, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}
.modal-wrapper {
    width: 90%;
    max-width: 900px;
    max-height: 85vh;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    transform: translateY(30px) scale(0.95);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
}
.modal-overlay.active .modal-wrapper {
    transform: translateY(0) scale(1);
}
.modal-header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}
.modal-title-area {
    max-width: 85%;
}
.modal-category {
    font-size: 0.78rem;
    font-weight: 800;
    color: var(--accent-cyan);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
}
.modal-title-area h2 {
    font-size: 1.8rem;
    color: var(--text-primary);
    line-height: 1.3;
}
.modal-close-btn {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s ease;
}
.modal-close-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.25);
    color: var(--text-primary);
    transform: rotate(90deg);
}
.modal-body {
    padding: 2.5rem;
    overflow-y: auto;
    flex: 1;
}

/* ==========================================================================
   SHARABLE & EXTENDABLE VIEWER CONTENT MARKUP STYLE
   (수강생들이 나중에 직접 HTML 워싱 자료를 붙여넣기 편리하도록 통일된 스타일 제공)
   ========================================================================== */
.viewer-content {
    font-size: 1.05rem;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.9);
}
.viewer-content p {
    margin-bottom: 1.5rem;
}
.viewer-content h3 {
    font-size: 1.5rem;
    margin: 2.5rem 0 1.25rem;
    color: var(--accent-cyan);
    border-bottom: 1px solid rgba(6, 182, 212, 0.15);
    padding-bottom: 0.5rem;
}
.viewer-content h4 {
    font-size: 1.2rem;
    margin: 2rem 0 1rem;
    color: var(--text-primary);
}
.viewer-content ul, .viewer-content ol {
    margin-bottom: 1.75rem;
    padding-left: 1.5rem;
}
.viewer-content li {
    margin-bottom: 0.65rem;
}
.viewer-content strong {
    color: var(--accent-gold);
    font-weight: 700;
}
.viewer-content blockquote {
    background: rgba(6, 182, 212, 0.1);
    border-left: 4px solid var(--accent-pink);
    padding: 1.25rem 1.75rem;
    border-radius: 0 16px 16px 0;
    margin: 2rem 0;
    font-style: italic;
    font-size: 1.1rem;
}
.viewer-content .highlight-box {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 1.5rem 2rem;
    margin: 2rem 0;
}
.viewer-content .highlight-box h5 {
    color: var(--accent-gold);
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
    font-weight: 800;
}
.viewer-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 2rem 0;
    font-size: 0.95rem;
}
.viewer-content th, .viewer-content td {
    padding: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: left;
}
.viewer-content th {
    background: rgba(6, 182, 212, 0.2);
    color: var(--text-primary);
    font-weight: 700;
}
.viewer-content tr:nth-child(even) td {
    background: rgba(255, 255, 255, 0.01);
}

/* Footer Section */
footer {
    border-top: 1px solid var(--border-color);
    padding: 3rem 2rem;
    text-align: center;
    margin-top: auto;
}
footer p {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

/* Responsiveness */
@media (max-width: 900px) {
    .hero-content h1 { font-size: 2.5rem; }
    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: rgba(8, 12, 20, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        padding: 1.5rem 2rem;
        gap: 1.25rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        z-index: 1000;
    }
    .nav-links.active { display: flex; }
    .nav-links a {
        padding: 0.5rem 0;
        font-size: 1.05rem;
        width: 100%;
        display: block;
    }
    .mobile-menu-btn { display: flex; }
    .modal-wrapper {
        width: 95%;
        max-height: 90vh;
    }
    .modal-header {
        padding: 1.5rem;
    }
    .modal-body {
        padding: 1.5rem;
    }
}

@media (max-width: 480px) {
    .hero-content h1 { font-size: 2.1rem; }
    .resources-grid { grid-template-columns: 1fr; }
    .filter-btn { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
}

    </style>
</head>

    <div class="main-container">
        <!-- Category Filters -->
        <div class="filters-container">
            <button class="filter-btn active" onclick="filterCategory('all')">전체</button>
            <button class="filter-btn" onclick="filterCategory('concept')">기본 개념</button>
            <button class="filter-btn" onclick="filterCategory('guide')">입문 가이드</button>
            <button class="filter-btn" onclick="filterCategory('reference')">레퍼런스</button>
        </div>

        <!-- Resources Grid -->
        <div class="resources-grid" id="resources-grid">
            <!-- Cards will be dynamically rendered via JS -->
        </div>
    </div>

    <!-- Modal details viewer -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-wrapper glass">
            <div class="modal-header">
                <div class="modal-title-area">
                    <div class="modal-category" id="modal-category">CATEGORY</div>
                    <h2 id="modal-title">Resource Title</h2>
                </div>
                <button class="modal-close-btn" onclick="closeModal(force=true)" aria-label="닫기">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- HTML content will be loaded here -->
            </div>
        </div>

    <!-- 자료 데이터 선언 (상세 본문을 포함한 JSON 데이터셋) 외부 분리 -->
    <script src="resource-data.js"></script>
    <script>
        // Render card grid dynamically
        function renderCards(data) {
            const grid = document.getElementById('resources-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-secondary);">
                        <i data-lucide="folder-open" style="width: 48px; height: 48px; margin-bottom: 1rem; color: var(--text-muted);"></i>
                        <p>해당 카테고리의 자료가 아직 없습니다.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            data.forEach(item => {
                const card = document.createElement('article');
                card.className = 'resource-card glass';
                card.setAttribute('onclick', `openModal('${item.id}')`);
                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-icon-box">
                            <i data-lucide="${item.icon}"></i>
                        </div>
                        <span class="card-badge">${item.categoryKo}</span>
                    </div>
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p>${item.summary}</p>
                    </div>
                    <div class="card-footer">
                        <span>${item.date} · ${item.readTime}</span>
                        <span class="read-more-btn">
                            자세히 보기 <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Category filtering logic
        function filterCategory(category) {
            // Update active state on buttons
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const eventTarget = event.currentTarget;
            eventTarget.classList.add('active');

            if (category === 'all') {
                renderCards(resourceData);
            } else {
                const filtered = resourceData.filter(item => item.category === category);
                renderCards(filtered);
            }
        }

        // Modal Open/Close logic
        function openModal(id) {
            const item = resourceData.find(d => d.id === id);
            if (!item) return;

            document.getElementById('modal-category').textContent = item.categoryKo;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-body').innerHTML = item.content;

            const overlay = document.getElementById('modal-overlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // prevent background scrolling
            
            lucide.createIcons();
        }

        function closeModal(e, force = false) {
            const overlay = document.getElementById('modal-overlay');
            
            // Close only if clicked on background or close button
            if (force || e.target === overlay) {
                overlay.classList.remove('active');
                document.body.style.overflow = ''; // restore scrolling
            }
        }

        // Init onload
        window.addEventListener('DOMContentLoaded', () => {
            renderCards(resourceData);

            // Header shrink effect
            window.addEventListener('scroll', function() {
                var h = document.getElementById('header');
                if (window.scrollY > 50) h.classList.add('scrolled');
                else h.classList.remove('scrolled');
            });

            // Mobile menu toggle
            const menuBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.querySelector('.nav-links');
            if (menuBtn) {
                menuBtn.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }
        });
    </script>
