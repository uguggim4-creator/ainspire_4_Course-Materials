    <style>

:root {
    --bg-primary: #080C14;
    --bg-secondary: #0F172A;
    --bg-card: rgba(30, 41, 59, 0.45);
    --border-color: rgba(255, 255, 255, 0.08);
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --accent-cyan: #06B6D4;
    --accent-emerald: #10B981;
    --accent-pink: #EC4899;
    --accent-gold: #F59E0B;
    --gradient-accent: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
    --gradient-card-hover: linear-gradient(180deg, rgba(6, 182, 212, 0.15) 0%, rgba(30, 41, 59, 0) 100%);
    --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
}
h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
.glass {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
}
header {
    position: fixed; top: 0; left: 0; width: 100%;
    z-index: 1000; transition: all 0.3s ease;
}
header.scrolled {
    background: rgba(8, 12, 20, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
}
.nav-container {
    max-width: 1400px; margin: 0 auto; padding: 1.25rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
}
.logo {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 1.25rem; font-weight: 800;
    background: var(--gradient-accent);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    cursor: pointer;
}
.logo i { -webkit-text-fill-color: initial; color: var(--accent-cyan); }
.nav-links { display: flex; list-style: none; gap: 2rem; }
.nav-links a {
    color: var(--text-secondary); text-decoration: none;
    font-size: 0.95rem; font-weight: 500; transition: color 0.3s ease;
}
.nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
.mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    cursor: pointer;
    font-size: 1.5rem;
    padding: 0.5rem;
    align-items: center;
    justify-content: center;
    transition: color 0.3s ease;
    z-index: 1001;
}
.mobile-menu-btn:hover {
    color: var(--accent-cyan);
}

.hero {
    position: relative; padding: 10rem 2rem 5rem;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; overflow: hidden;
}
.hero-bg-art {
    position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.07) 0%, rgba(8, 12, 20, 0) 70%);
    z-index: 0; pointer-events: none;
}
.hero-bg-art-2 {
    position: absolute; top: 20%; right: -15%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(236, 72, 153, 0.05) 0%, rgba(8, 12, 20, 0) 70%);
    z-index: 0; pointer-events: none;
}
.hero-content { position: relative; z-index: 1; max-width: 800px; }
.session-tag {
    display: inline-block; padding: 0.5rem 1.25rem;
    background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2);
    border-radius: 100px; font-size: 0.85rem; font-weight: 600;
    color: var(--accent-cyan); margin-bottom: 1.5rem;
    text-transform: uppercase; letter-spacing: 0.05em; box-shadow: var(--glow-cyan);
}
.hero-content h1 {
    font-size: 3rem; line-height: 1.2; margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #FFF 0%, #94A3B8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-content p { font-size: 1.15rem; color: var(--text-secondary); margin-bottom: 2.5rem; line-height: 1.7; }

.main-container { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 6rem; }

.mode-switcher { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; }
.btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600;
    font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease;
    text-decoration: none; font-family: 'Inter', sans-serif;
}
.btn-secondary {
    background: rgba(255, 255, 255, 0.04); color: var(--text-primary);
    border: 1px solid var(--border-color);
}
.btn-secondary:hover, .btn-secondary.mode-active {
    background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
}

.tabs-container {
    display: flex; justify-content: center; gap: 0.75rem;
    margin-bottom: 2.5rem; flex-wrap: wrap;
}
.tab-btn {
    padding: 0.6rem 1.25rem; font-size: 0.9rem; font-weight: 600;
    border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.04); color: var(--text-secondary);
    border: 1px solid var(--border-color); font-family: 'Inter', sans-serif;
}
.tab-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
.tab-btn.tab-active { color: #080C14; border-color: transparent; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.search-container { max-width: 500px; margin: 0 auto 3rem; position: relative; }
.search-input {
    width: 100%; padding: 0.9rem 1.25rem 0.9rem 3.25rem;
    background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color);
    border-radius: 99px; color: var(--text-primary); font-size: 0.95rem;
    transition: all 0.3s ease; font-family: 'Inter', sans-serif;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus {
    outline: none; border-color: var(--accent-cyan);
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
    background: rgba(15, 23, 42, 0.85);
}
.search-icon {
    position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; width: 18px; height: 18px;
}

.deck-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
.card-news-wrapper {
    position: relative; width: 100%; max-width: 580px;
    aspect-ratio: 4 / 5; perspective: 1200px;
}
.card-news-slide {
    position: absolute; width: 100%; height: 100%;
    border-radius: 22px; padding: 2.75rem 2.5rem;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
    opacity: 0; pointer-events: none;
    transform: translateX(40px) scale(0.97);
}
.card-news-slide.active {
    opacity: 1; pointer-events: auto; transform: translateX(0) scale(1); z-index: 10;
}
.card-news-slide.slide-out-left {
    opacity: 0; transform: translateX(-40px) scale(0.97); z-index: 5;
}
.card-header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 1.1rem;
    margin-bottom: 0;
}
.card-badge {
    padding: 0.3rem 0.85rem; border-radius: 99px;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}
.card-index { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }
.card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 1.75rem 0; gap: 1.5rem; }
.term-title-wrapper { display: flex; align-items: center; gap: 1rem; }
.term-icon-box {
    width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
}
.term-title { font-size: 2.1rem; color: var(--text-primary); line-height: 1.2; }
.term-desc-container {
    border-left: 4px solid; padding: 1.2rem 1.4rem;
    border-radius: 0 12px 12px 0;
    background: rgba(8, 12, 20, 0.5);
}
.term-desc { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); line-height: 1.6; }
.term-point-container {
    background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.09);
    padding: 1.1rem 1.25rem; border-radius: 12px;
}
.term-point-label {
    font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted);
    font-weight: 700; letter-spacing: 0.06em; margin-bottom: 0.45rem;
    display: flex; align-items: center; gap: 0.35rem;
}
.term-point { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.55; }

.controls-panel {
    display: flex; align-items: center; justify-content: center;
    gap: 1.25rem; margin-top: 2rem; width: 100%; max-width: 580px;
}
.control-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); cursor: pointer; transition: all 0.3s ease;
    font-family: inherit;
}
.control-btn:hover {
    background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2);
    color: var(--text-primary); transform: scale(1.08);
}
.progress-dots { display: flex; gap: 0.5rem; align-items: center; }
.dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.15); transition: all 0.3s ease; cursor: pointer;
}
.dot.dot-active { width: 20px; border-radius: 3px; }

.grid-container {
    display: none; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem; width: 100%;
}
.grid-card {
    border-radius: 16px; padding: 1.75rem; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 180px;
}
.grid-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
.grid-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
.grid-icon-box {
    width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
}
.grid-card-cat {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0.2rem 0.6rem; border-radius: 99px; background: rgba(255,255,255,0.05);
}
.grid-card h4 { font-size: 1.2rem; color: var(--text-primary); margin-bottom: 0.5rem; }
.grid-card-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.5; flex: 1; }
.grid-card-footer {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.75rem;
    margin-top: 1rem; font-size: 0.75rem; color: var(--text-muted);
}
.grid-card-point { flex: 1; padding-right: 0.5rem; }

footer { border-top: 1px solid var(--border-color); padding: 3rem 2rem; text-align: center; margin-top: 6rem; }
footer p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }

@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.grid-card { animation: fadeSlideIn 0.35s ease both; }

@media (max-width: 768px) {
    .hero-content h1 { font-size: 2.2rem; }
    .mobile-menu-btn { display: flex; }
    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: rgba(8, 12, 20, 0.98);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        padding: 1.5rem 2rem;
        gap: 1.25rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        z-index: 1000;
    }
    .nav-links.active { display: flex; }
    .nav-links a {
        padding: 0.5rem 0;
        font-size: 1.05rem;
        width: 100%;
        display: block;
    }
    .card-news-wrapper { aspect-ratio: 3 / 4; }
    .term-title { font-size: 1.75rem; }
    .grid-container { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}
@media (max-width: 480px) {
    .term-title { font-size: 1.5rem; }
    .term-desc { font-size: 1rem; }
    .card-news-slide { padding: 2rem 1.5rem; }
}

    </style>

        // Hex color to rgba helper
        function hexToRgba(hex, alpha) {
            var r = parseInt(hex.slice(1,3),16);
            var g = parseInt(hex.slice(3,5),16);
            var b = parseInt(hex.slice(5,7),16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';

        window.addEventListener('DOMContentLoaded', function() {

                var h = document.getElementById('header');
                if (window.scrollY > 50) h.classList.add('scrolled');
                else h.classList.remove('scrolled');
            });

            document.addEventListener('keydown', function(e) {
                if (viewMode !== 'slide') return;
                if (e.key === 'ArrowRight') nextSlide();
                else if (e.key === 'ArrowLeft') prevSlide();
                else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
            });
        });

        function setMode(mode) {
            viewMode = mode;
            var deckView = document.getElementById('deck-view');
            var gridView = document.getElementById('grid-view');
            var slideBtn = document.getElementById('btn-slide-mode');
            var gridBtn = document.getElementById('btn-grid-mode');
            var tabsCont = document.getElementById('tabs-container');

            stopPlay();
            if (mode === 'slide') {
                slideBtn.classList.add('mode-active');
                gridBtn.classList.remove('mode-active');
                deckView.style.display = 'flex';
                gridView.style.display = 'none';
                tabsCont.style.display = 'flex';
                renderSlides();

            } else {
                gridBtn.classList.add('mode-active');
                slideBtn.classList.remove('mode-active');
                deckView.style.display = 'none';
                gridView.style.display = 'grid';
                tabsCont.style.display = 'none';
                renderGrid();
                lucide.createIcons();
            }
        }

        function buildTabs() {
            var cont = document.getElementById('tabs-container');
            cont.innerHTML = '';
            glossaryData.forEach(function(cat, i) {
                var btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === catIdx ? ' tab-active' : '');
                btn.textContent = cat.category_title;
                if (i === catIdx) {
                    btn.style.backgroundColor = cat.color;
                }
                btn.addEventListener('click', function() { selectCategory(i); });
                cont.appendChild(btn);
            });
        }

        function selectCategory(i) {
            catIdx = i;
            slideIdx = 0;
            stopPlay();
            buildTabs();
            renderSlides();
            lucide.createIcons();
        }

        function renderSlides() {
            var wrapper = document.getElementById('card-news-wrapper');
            wrapper.innerHTML = '';
            var cat = glossaryData[catIdx];
            var color = cat.color;

            cat.terms.forEach(function(term, i) {
                var slide = document.createElement('div');
                slide.className = 'card-news-slide glass' + (i === slideIdx ? ' active' : '');
                slide.id = 'slide-' + i;
                slide.style.borderColor = hexToRgba(color, 0.15);

                var labelText = (cat.category_id === 'ai_basic') ? '실무 활용 및 이해' : '실무 포인트';

                slide.innerHTML = '<div class="card-header">'
                    + '<div class="card-badge" style="background:' + hexToRgba(color, 0.12) + ';color:' + color + ';border:1px solid ' + hexToRgba(color, 0.3) + ';">' + cat.category_title + '</div>'
                    + '<div class="card-index">' + (i+1) + ' / ' + cat.terms.length + '</div>'
                    + '</div>'
                    + '<div class="card-body">'
                    + '<div class="term-title-wrapper">'
                    + '<div class="term-icon-box" style="color:' + color + ';border-color:' + hexToRgba(color, 0.2) + ';">'
                    + '<i data-lucide="' + term.icon + '" style="width:22px;height:22px;"></i>'
                    + '</div>'
                    + '<h3 class="term-title">' + term.term + '</h3>'
                    + '</div>'
                    + '<div class="term-desc-container" style="border-left-color:' + color + ';background:' + hexToRgba(color, 0.04) + ';">'
                    + '<div class="term-desc">' + term.desc + '</div>'
                    + '</div>'
                    + '<div class="term-point-container">'
                    + '<div class="term-point-label">'
                    + '<i data-lucide="check-circle" style="width:11px;height:11px;color:' + color + ';"></i>'
                    + ' ' + labelText
                    + '</div>'
                    + '<div class="term-point">' + term.point + '</div>'
                    + '</div>'
                    + '</div>';

                wrapper.appendChild(slide);
            });
            renderDots();
        }

        function renderDots() {
            var cont = document.getElementById('progress-dots');
            cont.innerHTML = '';
            var cat = glossaryData[catIdx];
            var color = cat.color;
            cat.terms.forEach(function(_, i) {
                var dot = document.createElement('div');
                dot.className = 'dot' + (i === slideIdx ? ' dot-active' : '');
                dot.style.background = (i === slideIdx) ? color : 'rgba(255,255,255,0.15)';
                dot.addEventListener('click', function() { jumpToSlide(i); });
                cont.appendChild(dot);
            });
        }

        function jumpToSlide(idx) {
            var prev = slideIdx;
            slideIdx = idx;
            var slides = document.querySelectorAll('.card-news-slide');
            slides.forEach(function(s, i) {
                s.classList.remove('active', 'slide-out-left');
                if (i === prev && i !== idx) s.classList.add('slide-out-left');
                if (i === idx) s.classList.add('active');
            });
            var color = glossaryData[catIdx].color;
            var dots = document.querySelectorAll('.dot');
            dots.forEach(function(d, i) {
                d.classList.toggle('dot-active', i === idx);
                d.style.background = (i === idx) ? color : 'rgba(255,255,255,0.15)';
            });
            lucide.createIcons();
        }

        function nextSlide() {
            var count = glossaryData[catIdx].terms.length;
            jumpToSlide((slideIdx + 1) % count);
        }

        function prevSlide() {
            var count = glossaryData[catIdx].terms.length;
            jumpToSlide((slideIdx - 1 + count) % count);
        }

        function renderGrid() {
            var grid = document.getElementById('grid-view');
            grid.innerHTML = '';
            var query = document.getElementById('search-input').value.trim().toLowerCase();

            flatTerms.forEach(function(item, index) {
                var visible = !query
                    || item.term.toLowerCase().includes(query)
                    || item.desc.toLowerCase().includes(query)
                    || item.point.toLowerCase().includes(query)
                    || item.catTitle.toLowerCase().includes(query);

                if (!visible) return;

                var card = document.createElement('div');
                card.className = 'grid-card glass';
                card.style.animationDelay = (index * 0.03) + 's';
                card.style.setProperty('--theme-color', item.color);
                card.style.borderColor = hexToRgba(item.color, 0.1);
                card.addEventListener('click', function() {
                    catIdx = item.catIdx;
                    slideIdx = item.termIdx;
                    setMode('slide');
                    buildTabs();
                    lucide.createIcons();
                });

                var shortPoint = item.point.length > 28 ? item.point.slice(0,27) + '…' : item.point;

                card.innerHTML = '<div>'
                    + '<div class="grid-card-top">'
                    + '<div class="grid-icon-box" style="color:' + item.color + ';border-color:' + hexToRgba(item.color, 0.25) + ';">'
                    + '<i data-lucide="' + item.icon + '" style="width:16px;height:16px;"></i>'
                    + '</div>'
                    + '<span class="grid-card-cat" style="color:' + item.color + ';">' + item.catTitle + '</span>'
                    + '</div>'
                    + '<h4>' + item.term + '</h4>'
                    + '<p class="grid-card-desc">' + item.desc + '</p>'
                    + '</div>'
                    + '<div class="grid-card-footer">'
                    + '<span class="grid-card-point">' + shortPoint + '</span>'
                    + '<i data-lucide="arrow-right" style="width:12px;height:12px;flex-shrink:0;"></i>'
                    + '</div>';

                grid.appendChild(card);
            });
        }

        function handleSearch(query) {
            if (viewMode === 'grid') {
                renderGrid();
                lucide.createIcons();
            } else {
                var q = query.trim().toLowerCase();
                if (!q) return;
                var match = flatTerms.find(function(item) {
                    return item.term.toLowerCase().includes(q)
                        || item.desc.toLowerCase().includes(q)
                        || item.point.toLowerCase().includes(q);
                });
                if (match) {
                    catIdx = match.catIdx;
                    slideIdx = match.termIdx;
                    buildTabs();
                    renderSlides();
                    lucide.createIcons();
                }
            }
        }

        function togglePlay() {
            if (isPlaying) stopPlay(); else startPlay();
        }

        function startPlay() {
            isPlaying = true;
            document.getElementById('play-btn').innerHTML = '<i data-lucide="pause" style="width:18px;height:18px;"></i>';
            lucide.createIcons();
            playTimer = setInterval(nextSlide, 3500);
        }

        function stopPlay() {
            isPlaying = false;
            document.getElementById('play-btn').innerHTML = '<i data-lucide="play" style="width:18px;height:18px;"></i>';
            lucide.createIcons();
            clearInterval(playTimer);
        }

        // 모바일 햄버거 토글 동작
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const navLinksContainer = document.querySelector('.nav-links');
        const navLinks = document.querySelectorAll('.nav-links a');

        if (mobileMenuBtn && navLinksContainer) {
            mobileMenuBtn.addEventListener('click', () => {
                navLinksContainer.classList.toggle('active');
                const icon = mobileMenuBtn.querySelector('i');
                if (navLinksContainer.classList.contains('active')) {
                    icon.setAttribute('data-lucide', 'x');
                } else {
                    icon.setAttribute('data-lucide', 'menu');
                }
                lucide.createIcons();
            });

            // 메뉴 내부 클릭 시 메뉴 닫기
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navLinksContainer.classList.remove('active');
                    const icon = mobileMenuBtn.querySelector('i');
                    icon.setAttribute('data-lucide', 'menu');
                    lucide.createIcons();
                });
            });
        }
    </script>
</body>
</html>
