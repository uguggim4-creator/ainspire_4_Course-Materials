<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AInspire 4기 — 수강생 전용 교안 자료집</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Lucide Icons (self-hosted) -->
    <script src="/assets/js/lucide.min.js" defer></script>
    
    <style>
        /* Paperlogy — 슬라이드 덱과 폰트 통일 */
        @font-face{font-family:'Paperlogy';src:url('/assets/fonts/Paperlogy-4Regular.woff2') format('woff2');font-weight:400;font-display:swap;}
        @font-face{font-family:'Paperlogy';src:url('/assets/fonts/Paperlogy-7Bold.woff2') format('woff2');font-weight:700;font-display:swap;}
        @font-face{font-family:'Paperlogy';src:url('/assets/fonts/Paperlogy-8ExtraBold.woff2') format('woff2');font-weight:800;font-display:swap;}

        :root {
            /* AInspire 프리미엄 다크 퍼플 & 글라스모피즘 스타일 정의 */
            --bg-primary: #05020c;
            --bg-secondary: #0c0618;
            --bg-card: rgba(22, 11, 38, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --text-primary: #f5f3f7;
            --text-secondary: #aba1bd;
            --text-muted: #74688b;
            
            --accent-purple: #8f55ff;
            --accent-cyan: #bba4ff;
            --accent-yellow: #ffe600;
            --accent-emerald: #00e676;
            --accent-pdf: #ff4a5a;

            --brand-grad: linear-gradient(135deg, #6020ff 0%, #8f55ff 100%);
            --brand-grad-soft: linear-gradient(135deg, rgba(96, 32, 255, 0.15), rgba(143, 85, 255, 0.15));
            --gradient-card-hover: linear-gradient(180deg, rgba(96, 32, 255, 0.12) 0%, rgba(12, 6, 24, 0) 100%);
            --glow-purple: 0 0 25px rgba(96, 32, 255, 0.35);
            --glow-cyan: 0 0 25px rgba(143, 85, 255, 0.3);
            
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 24px;
            
            --content-width: 1200px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Paperlogy', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .brand-font {
            font-family: 'Paperlogy', 'Pretendard', sans-serif;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        /* Glassmorphism Util */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-color);
        }

        /* Background Blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.45;
        }
        .blob-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(96, 32, 255, 0.4) 0%, transparent 70%);
        }
        .blob-2 {
            top: 25%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(96, 32, 255, 0.3) 0%, transparent 70%);
        }
        .blob-3 {
            bottom: -5%;
            left: 20%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(96, 32, 255, 0.25) 0%, transparent 70%);
        }

        /* Header Navigation */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        #header.scrolled {
            background: rgba(5, 2, 12, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }
        .nav-container {
            max-width: var(--content-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
        }
        .logo-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-main {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--brand-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo-main span.badge-num {
            background: rgba(96, 32, 255, 0.15);
            border: 1px solid rgba(143, 85, 255, 0.3);
            color: var(--accent-cyan);
            font-size: 11px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 5px;
            -webkit-text-fill-color: initial;
        }
        .logo-separator {
            color: var(--border-color);
            font-weight: 300;
            font-size: 1.2rem;
        }
        .logo-sub-badge {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.05em;
            padding: 3px 8px;
            background: rgba(143, 85, 255, 0.1);
            border: 1px solid rgba(143, 85, 255, 0.25);
            border-radius: 6px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            white-space: nowrap;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .logo-sub-badge:hover {
            background: rgba(143, 85, 255, 0.2);
            box-shadow: var(--glow-cyan);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }
        .nav-links a.active {
            color: var(--accent-cyan);
            font-weight: 700;
        }
        .btn-header-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: var(--brand-grad);
            border: none;
            border-radius: 99px;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(96, 32, 255, 0.35);
            transition: all 0.3s ease;
        }
        .btn-header-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(96, 32, 255, 0.5), var(--glow-cyan);
        }

        /* Hero Section */
        .hero {
            position: relative;
            padding: 9.5rem 2rem 4rem;
            text-align: center;
            overflow: hidden;
        }
        .hero-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 100px;
            background: rgba(143, 85, 255, 0.1);
            border: 1px solid rgba(143, 85, 255, 0.25);
            color: var(--accent-purple);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 15px rgba(143, 85, 255, 0.05);
        }
        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 3.4rem);
            line-height: 1.2;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }
        .hero p {
            font-size: clamp(1rem, 1.8vw, 1.15rem);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
        /* Catalog Layout (Search & Filter) */
        .catalog-container {
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 0 2rem 8rem;
            position: relative;
            z-index: 1;
        }

        .search-filter-bar {
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
        }

        /* 1안: Tab List (Skilljar Style) */
        .tabs-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            list-style: none;
        }
        .tab-btn {
            display: inline-flex;
            align-items: center;
            background: none;
            border: none;
            padding: 0.75rem 1.25rem;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.01em;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            outline: none;
        }
        .tab-btn:hover {
            color: var(--text-primary);
        }
        .tab-btn.active {
            color: var(--accent-cyan);
            font-weight: 700;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--brand-grad);
            border-radius: 10px;
        }

        .search-control-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-grow: 1;
            max-width: 480px;
        }
        @media (max-width: 768px) {
            .search-control-group {
                max-width: 100%;
            }
        }
        .search-wrapper {
            position: relative;
            flex-grow: 1;
        }
        .search-wrapper .search-icon {
            position: absolute;
            left: 1.4rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
            pointer-events: none;
            z-index: 1;
        }
        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3.2rem;
            background: rgba(12, 6, 24, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 99px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: var(--accent-purple);
            box-shadow: var(--glow-purple);
            background: rgba(22, 11, 38, 0.6);
        }
        .search-wrapper button.clear-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .search-wrapper button.clear-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
        }
        .reset-search-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .reset-search-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        /* Material / Course Listing Grid */
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.75rem;
            min-height: 250px;
        }
        @media (max-width: 1024px) {
            .materials-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 680px) {
            .materials-grid { grid-template-columns: 1fr; }
        }

        /* Materials Card */
        .material-card {
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
        }
        .material-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-card-hover);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }
        .material-card:hover {
            transform: translateY(-6px);
            border-color: rgba(143, 85, 255, 0.35);
            box-shadow: var(--glow-purple), 0 12px 30px rgba(5, 2, 12, 0.6);
        }
        .material-card:hover::before {
            opacity: 1;
        }
        .material-card * {
            position: relative;
            z-index: 1;
        }
        
        .card-top {
            padding: 1.5rem 1.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(143, 85, 255, 0.1);
            border: 1px solid rgba(143, 85, 255, 0.2);
            color: var(--accent-purple);
            transition: all 0.3s ease;
        }
        .material-card:hover .card-icon-wrapper {
            background: rgba(143, 85, 255, 0.1);
            border-color: rgba(143, 85, 255, 0.3);
            color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(143, 85, 255, 0.15);
        }

        .badge-group {
            display: flex;
            gap: 0.4rem;
        }
        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .badge-category {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .badge-format {
            font-weight: 800;
        }
        .badge-format.pdf {
            background: rgba(255, 74, 90, 0.12);
            border: 1px solid rgba(255, 74, 90, 0.3);
            color: var(--accent-pdf);
        }
        .badge-format.excel {
            background: rgba(0, 230, 118, 0.12);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: var(--accent-emerald);
        }
        .badge-format.link {
            background: rgba(143, 85, 255, 0.12);
            border: 1px solid rgba(143, 85, 255, 0.3);
            color: var(--accent-cyan);
        }
        .badge-format.article {
            background: rgba(143, 85, 255, 0.12);
            border: 1px solid rgba(143, 85, 255, 0.3);
            color: var(--accent-purple);
        }
        .badge-format.coming-soon {
            background: rgba(150, 150, 150, 0.1);
            border: 1px solid rgba(150, 150, 150, 0.3);
            color: #999;
        }

        .card-body {
            padding: 0 1.5rem 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body h3 {
            font-size: 1.15rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        .material-card:hover .card-body h3 {
            color: #fff;
        }
        .card-body p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }
        .card-footer .left-meta {
            font-weight: 500;
        }
        .card-footer .action-text {
            font-weight: 700;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s ease;
        }
        .material-card:hover .action-text {
            color: var(--accent-cyan);
        }
        .card-footer .footer-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .card-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .card-download:hover {
            color: var(--accent-cyan);
            border-color: var(--accent-purple);
            background: rgba(143, 85, 255, 0.12);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            background: #030108;
            padding: 3rem 2rem;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }
        footer p {
            margin-bottom: 0.5rem;
        }
        footer p.warning-txt {
            color: var(--text-muted);
            opacity: 0.7;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* ===== 자료 미리보기 모달 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2.5vh 2.5vw;
            background: rgba(3, 1, 8, 0.78);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .modal-overlay.open {
            display: flex;
            opacity: 1;
        }
        .modal-window {
            position: relative;
            /* 화면을 최대한 채우되 본문(iframe)이 16:9가 되도록.
               가용 폭(96vw)과 가용 높이(96vh-헤더)로 산출한 16:9 폭 중 작은 쪽 = 화면에 꽉 참 */
            --modal-head-h: 64px;
            --avail-h: calc(96vh - var(--modal-head-h));
            width: min(96vw, calc(var(--avail-h) * 16 / 9));
            max-height: 96vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), var(--glow-purple);
            overflow: hidden;
            transform: translateY(12px) scale(0.99);
            transition: transform 0.25s ease;
        }
        .modal-overlay.open .modal-window {
            transform: translateY(0) scale(1);
        }
        .modal-head {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }
        .modal-head .m-icon {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            background: var(--brand-grad-soft);
            color: var(--accent-cyan);
        }
        .modal-head .m-icon i { width: 20px; height: 20px; }
        .modal-head .m-text { flex: 1; min-width: 0; }
        .modal-head .m-title {
            font-size: 1.02rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .modal-head .m-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .modal-head .m-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .modal-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
            text-decoration: none;
        }
        .modal-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-purple);
            background: rgba(143, 85, 255, 0.12);
        }
        .modal-btn i { width: 15px; height: 15px; }
        .modal-close {
            width: 38px;
            padding: 0;
            justify-content: center;
        }
        .modal-body {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0a0612;
            overflow: hidden;
        }
        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
        /* 모달 내부 회색 스크롤바 */
        .modal-window ::-webkit-scrollbar { width: 12px; height: 12px; }
        .modal-window ::-webkit-scrollbar-track { background: #2a2a2e; }
        .modal-window ::-webkit-scrollbar-thumb {
            background: #6e6e76;
            border-radius: 6px;
            border: 2px solid #2a2a2e;
        }
        .modal-window ::-webkit-scrollbar-thumb:hover { background: #8a8a92; }
        .modal-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            gap: 0.6rem;
        }
        .modal-loading .spin {
            width: 18px; height: 18px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: m-spin 0.8s linear infinite;
        }
        @keyframes m-spin { to { transform: rotate(360deg); } }
        @media (max-width: 640px) {
            .modal-overlay { padding: 0; }

    <!-- 자료 미리보기 모달 -->
    <div class="modal-overlay" id="material-modal" onclick="if(event.target===this)closeModal()">

                    </button>
                </div>

            </div>

    <!-- 자료 데이터 로드 및 렌더링 스크립트 -->
    <script src="data-materials.js"></script>
    <script>
        let currentFilter = 'all';
        let searchQuery = '';
        let currentModalFrameSrc = '';
        let currentModalItemType = '';

        // 카드 렌더링 함수
        function renderMaterials(data) {
            const grid = document.getElementById('materials-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 5rem 2rem; color: var(--text-secondary);">
                        <i data-lucide="search-code" style="width: 48px; height: 48px; margin-bottom: 1.25rem; color: var(--text-muted); opacity: 0.6;"></i>
                        <p style="font-size: 1.05rem; font-weight: 600;">검색 결과와 일치하는 자료가 없습니다.</p>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem;">다른 검색어를 입력하시거나 필터를 리셋해 보세요.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            data.forEach(item => {
                const card = document.createElement('article');
                card.className = 'material-card glass';
                
                // 클릭 시 모달 미리보기
                if (item.fileType === 'coming-soon') {
                    card.style.opacity = '0.5';
                    card.style.cursor = 'default';
                    card.setAttribute('onclick', '');
                } else {
                    card.setAttribute('onclick', `openMaterial('${item.id}')`);
                }

                // 파일 포맷 아이콘 매핑
                let formatBadgeColor = '';
                if (item.fileType === 'pdf') formatBadgeColor = 'pdf';
                else if (item.fileType === 'excel') formatBadgeColor = 'excel';
                else if (item.fileType === 'article') formatBadgeColor = 'article';
                else if (item.fileType === 'coming-soon') formatBadgeColor = 'coming-soon';
                else formatBadgeColor = 'link';

                // 액션 텍스트 정의 (전부 모달 미리보기)
                let actionText = '미리보기';
                let actionIcon = 'eye';
                if (item.fileType === 'link') {
                    actionText = '열기';
                    actionIcon = 'arrow-right';
                } else if (item.fileType === 'notion') {
                    actionText = 'Notion 열기';
                    actionIcon = 'external-link';
                } else if (item.fileType === 'article') {
                    actionText = '읽기';
                    actionIcon = 'book-open';
                } else if (item.fileType === 'folder') {
                    actionText = '폴더 열기';
                    actionIcon = 'folder-open';
                } else if (item.fileType === 'coming-soon') {
                    actionText = '준비 중';
                    actionIcon = 'clock';
                }

                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-icon-wrapper">
                            <i data-lucide="${item.icon}"></i>
                        </div>
                        <div class="badge-group">
                            <span class="badge badge-category">${item.categoryKo}</span>
                            <span class="badge badge-format ${formatBadgeColor}">${item.fileType === 'coming-soon' ? '준비 중' : item.fileType}</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p>${item.summary}</p>
                    </div>
                    <div class="card-footer">
                        <span class="left-meta">${item.date}</span>
                        <span class="footer-actions">
                            ${(item.fileType === 'pdf' || item.fileType === 'excel') ? `
                            <button class="card-download" title="다운로드" onclick="event.stopPropagation(); downloadMaterial('${item.id}')">
                                <i data-lucide="download" style="width: 15px; height: 15px;"></i>
                            </button>` : ''}
                            <span class="action-text">
                                ${actionText} <i data-lucide="${actionIcon}" style="width: 14px; height: 14px;"></i>
                            </span>
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        // PDF·Excel 다운로드 (Drive 직접 다운로드 링크)
        function downloadMaterial(id) {
            const item = materialData.find(m => m.id === id);
            if (!item) return;
            const url = item.driveId
                ? `https://drive.google.com/uc?export=download&id=${item.driveId}`
                : item.filePath;
            window.open(url, '_blank', 'noopener');
        }

        // 자료 유형별 모달 미리보기
        function openMaterial(id) {
            const item = materialData.find(m => m.id === id);
            if (!item) return;

            let frameSrc = '';
            let openNewHref = '';

            if (item.fileType === 'article') {
                // 로컬 HTML 아티클: 뷰어를 임베드 모드로 띄움
                frameSrc = `viewer.html?id=${id}&embed=1`;
                openNewHref = `viewer.html?id=${id}`;
            } else if (item.fileType === 'pdf' || item.fileType === 'excel') {
                // Google Drive 미리보기
                if (item.driveId) {
                    frameSrc = `https://drive.google.com/file/d/${item.driveId}/preview`;
                    openNewHref = `https://drive.google.com/file/d/${item.driveId}/view`;
                } else {
                    // driveId 없으면 로컬 파일 폴백
                    frameSrc = item.filePath;
                    openNewHref = item.filePath;
                }
            } else if (item.fileType === 'folder') {
                // Google Drive 폴더: 모달에 폴더 그리드 미리보기, 새 탭은 폴더 열기
                frameSrc = `https://drive.google.com/embeddedfolderview?id=${item.driveId}#grid`;
                openNewHref = `https://drive.google.com/drive/folders/${item.driveId}`;
            } else if (item.fileType === 'notion') {
                // Notion 페이지: iframe 차단으로 새 탭 직접 열기
                window.open(item.notionUrl, '_blank', 'noopener');
                return;
            } else {
                // link: 로컬 HTML 페이지(슬라이드/CineGuide) 임베드
                const sep = item.filePath.includes('?') ? '&' : '?';
                frameSrc = `${item.filePath}${sep}embed=1`;
                openNewHref = item.filePath;
            }

            // 부모(포털)가 ?debug=1 이면 로컬 HTML iframe에도 debug 전달
            // (Drive 미리보기 같은 외부 URL에는 붙이지 않음)
            if (new URLSearchParams(location.search).get('debug') === '1'
                && (item.fileType === 'article' || item.fileType === 'link')) {
                frameSrc += '&debug=1';
            }

            // 모달 채우기
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-meta').textContent = `${item.categoryKo} · ${item.readTime}`;
            document.getElementById('modal-open-new').href = openNewHref;

            const iconEl = document.getElementById('modal-icon');
            iconEl.setAttribute('data-lucide', item.icon || 'file-text');

            const loading = document.getElementById('modal-loading');
            const frame = document.getElementById('modal-frame');
            if (frameSrc === currentModalFrameSrc) {
                loading.style.display = 'none';
                try {
                    frame.contentWindow.postMessage({ type: 'ainspire:modal-open' }, location.origin);
                } catch (err) {
                    // Cross-origin iframes such as Google Drive cannot be controlled from here.
                }
            } else {
                loading.style.display = 'flex';
                frame.onload = () => {
                    loading.style.display = 'none';
                    try {
                        frame.contentWindow.postMessage({ type: 'ainspire:modal-open' }, location.origin);
                    } catch (err) {
                        // Cross-origin iframes such as Google Drive cannot be controlled from here.
                    }
                };
                frame.src = frameSrc;
                currentModalFrameSrc = frameSrc;
                currentModalItemType = item.fileType;
            }

            const overlay = document.getElementById('material-modal');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            const overlay = document.getElementById('material-modal');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
            // 로컬 iframe은 DOM을 유지해 재오픈을 빠르게 하고, 내부 미디어만 멈춘다.
            const frame = document.getElementById('modal-frame');
            try {
                frame.contentWindow.postMessage({ type: 'ainspire:modal-close' }, location.origin);
            } catch (err) {
                // Cross-origin iframes such as Google Drive cannot be controlled from here.
            }
            setTimeout(() => {
                if (!overlay.classList.contains('open') && currentModalItemType !== 'article' && currentModalItemType !== 'link') {
                    frame.src = 'about:blank';
                    currentModalFrameSrc = '';
                    currentModalItemType = '';
                }
            }, 250);
        }

        // ESC로 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 검색 처리 함수
        function handleSearch() {
            const input = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-btn');
            searchQuery = input.value.trim().toLowerCase();

            if (searchQuery.length > 0) {
                clearBtn.style.display = 'flex';
            } else {
                clearBtn.style.display = 'none';
            }

            applyFilters();
        }

        // 검색어 삭제 함수
        function clearSearch() {
            const input = document.getElementById('search-input');
            input.value = '';
            searchQuery = '';
            document.getElementById('clear-btn').style.display = 'none';
            applyFilters();
            input.focus();
        }

        // 카테고리 필터링 함수
        function filterCategory(category, event) {
            currentFilter = category;
            
            // 모든 탭의 active 클래스 제거 및 클릭된 탭 추가
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            if (event) {
                event.currentTarget.classList.add('active');
            }

            applyFilters();
        }

        // 필터 및 검색 적용 통합 함수
        function applyFilters() {
            let filtered = materialData;

            // 1. 카테고리 필터
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.category === currentFilter);
            }

            // 2. 검색어 필터
            if (searchQuery.length > 0) {
                filtered = filtered.filter(item => {
                    return item.title.toLowerCase().includes(searchQuery) || 
                           item.summary.toLowerCase().includes(searchQuery);
                });
            }

            renderMaterials(filtered);
        }

        // 전체 초기화 (Reset 버튼 클릭)
        function resetAllFilters() {
            // 검색어 지우기
            const input = document.getElementById('search-input');
            input.value = '';
            searchQuery = '';
            document.getElementById('clear-btn').style.display = 'none';

            // 카테고리 '전체'로 복구
            currentFilter = 'all';
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((tab, index) => {
                if (index === 0) tab.classList.add('active');
                else tab.classList.remove('active');
            });

            renderMaterials(materialData);
        }

        // 초기 로딩
        window.addEventListener('DOMContentLoaded', () => {
            // 전체 자료 카드 렌더링
            renderMaterials(materialData);

            // 헤더 스크롤 이펙트
            window.addEventListener('scroll', function() {
                const header = document.getElementById('header');
                if (window.scrollY > 40) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });
        });
    </script>
    <!-- 디테일 편집용 주석 모드 (?debug=1 일 때만 활성) -->
    <script src="debug-annotate.js"></script>
</body>
