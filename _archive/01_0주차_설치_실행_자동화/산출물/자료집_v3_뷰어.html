<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ainspire 4기 — 로컬 AI 자료집 V3</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1e222e; --line:#2a2f3d;
    --text:#e7e9ee; --muted:#9aa2b1; --accent:#6c8cff; --accent2:#22d3ee; --chip:#242938;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Pretendard","Segoe UI",-apple-system,system-ui,sans-serif;
    background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden;}
  aside{width:340px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--line);
    display:flex; flex-direction:column; height:100%;}
  .brand{padding:20px 18px 14px; border-bottom:1px solid var(--line)}
  .brand .k{font-size:11px; letter-spacing:.18em; color:var(--accent2); font-weight:700}
  .brand h1{margin:6px 0 2px; font-size:17px; font-weight:800}
  .brand p{margin:0; font-size:12px; color:var(--muted)}
  .search{padding:12px 14px; border-bottom:1px solid var(--line)}
  .search input{width:100%; padding:9px 12px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); font-size:13px; outline:none;}
  .search input:focus{border-color:var(--accent)}
  nav{overflow-y:auto; padding:8px; flex:1}
  .item{display:flex; gap:10px; align-items:center; padding:9px 11px; border-radius:9px;
    cursor:pointer; color:var(--muted); font-size:13px; line-height:1.35;}
  .item:hover{background:var(--panel2); color:var(--text)}
  .item.active{background:linear-gradient(90deg,rgba(108,140,255,.22),rgba(34,211,238,.10)); color:#fff}
  .item .badge{flex-shrink:0; width:30px; height:30px; border-radius:8px; background:var(--chip);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--accent2);}
  .item.active .badge{background:var(--accent); color:#fff}
  .item .t{font-weight:600}
  main{flex:1; overflow-y:auto; height:100%}
  .topbar{position:sticky; top:0; z-index:5; backdrop-filter:blur(8px);
    background:rgba(15,17,23,.78); border-bottom:1px solid var(--line);
    padding:14px 28px; display:flex; align-items:center; gap:12px;}
  .topbar .num{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;}
  .topbar h2{margin:0;font-size:16px;font-weight:700}
  .wrap{max-width:760px; margin:0 auto; padding:44px 28px 110px}
  .md{font-size:16.5px}
  .md h2{font-size:23px;font-weight:800;margin:46px 0 16px;line-height:1.4}
  .md h3{font-size:18.5px;font-weight:800;margin:34px 0 12px;line-height:1.45}
  .md h4{font-size:14px;font-weight:700;margin:22px 0 6px;color:var(--accent2);letter-spacing:.02em}
  .md p{line-height:1.85;color:#d4d8e1;margin:18px 0;word-break:keep-all}
  /* 리스트 → 카드 박스 (토스 aside 패턴, 다크) */
  .md ul,.md ol{background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:20px 22px 20px 40px;margin:20px 0;line-height:1.8;color:#d4d8e1}
  .md li{margin:6px 0}
  .md li::marker{color:var(--accent2);font-weight:700}
  .md ul ul,.md ol ol,.md ul ol,.md ol ul{background:none;border:none;padding:4px 0 4px 20px;margin:3px 0}
  .md strong{color:#fff;font-weight:700}
  .md em{color:var(--accent2);font-style:normal}
  .md hr{border:none;border-top:1px dashed var(--line);margin:26px 0}
  .md code{background:var(--panel2);border:1px solid var(--line);padding:1px 6px;border-radius:5px;font-size:13px;color:#ffd9a0}
  .md pre{background:#0b0d13;border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto}
  .md pre code{background:none;border:none;padding:0;color:#cfe3ff}
  .md table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px}
  .md th,.md td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
  .md th{background:var(--panel2);color:#fff;font-weight:700}
  .md tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  .md blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:6px 14px;color:var(--muted);background:var(--panel2);border-radius:0 8px 8px 0}
  .md img{display:block;max-width:100%;margin:22px auto 4px;border-radius:12px;border:1px solid var(--line);background:#fff}
  .md video{display:block;max-width:100%;margin:22px auto 4px;border-radius:12px;border:1px solid var(--line);background:#000}
  .md img + em, .md video + em, .media-grid + em{display:block;text-align:center;color:var(--muted);font-size:12.5px;margin:0 0 26px;font-style:normal}
  /* 연속 미디어 → 그리드 */
  .media-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:22px 0 4px}
  .media-grid img, .media-grid video{margin:0;width:100%}
  .media-grid:has(> :nth-child(3):last-child) , .media-grid:has(> :nth-child(3)){grid-template-columns:repeat(3,1fr)}
  /* 인터랙티브 위젯 */
  .widget{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;margin:24px 0;font-size:14px}
  .wg-title{font-weight:800;color:#fff;font-size:14px;margin-bottom:12px}
  .wg-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .widget button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .widget button:hover{filter:brightness(1.1)}
  .wg-note{margin-top:10px;color:var(--muted);font-size:12.5px;line-height:1.5}
  /* 터미널 */
  .wg-term{background:#0b0d13;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .wg-term-bar{display:flex;gap:6px;padding:9px 12px;background:#161a23;border-bottom:1px solid var(--line)}
  .wg-term-bar span{width:11px;height:11px;border-radius:50%;background:#3a4150}
  .wg-term-body{padding:14px 16px;font-family:ui-monospace,Consolas,Menlo,monospace;font-size:13px;min-height:84px;line-height:1.7}
  .wg-line{white-space:pre-wrap;word-break:break-all}
  .wg-prompt{color:var(--accent2);font-weight:700}
  .wg-cmd{color:#cfe3ff}
  .wg-muted{color:var(--muted)}
  .wg-result{color:#9be39b;margin-top:6px}
  /* 토큰 */
  .wg-input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:#fff;padding:9px 12px;font-size:14px;font-family:inherit;outline:none}
  .wg-input:focus{border-color:var(--accent)}
  .wg-tokens{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .wg-tok{background:rgba(34,211,238,.14);border:1px solid rgba(34,211,238,.4);color:#bdeefb;border-radius:6px;padding:3px 9px;font-size:13px;font-family:ui-monospace,monospace}
  /* 컨텍스트 책상 */
  .wg-desk{display:flex;flex-wrap:wrap;gap:8px;min-height:84px;align-content:flex-start;background:var(--panel2);border:1px dashed var(--line);border-radius:10px;padding:12px}
  .wg-doc{background:#fff;color:#1a1a1a;border-radius:5px;padding:6px 10px;font-size:12.5px;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .wg-bar{height:8px;background:var(--panel2);border-radius:5px;margin-top:10px;overflow:hidden}
  .wg-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
  /* 에이전트 */
  .wg-goal{background:var(--panel2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:9px 13px;color:#d4d8e1;font-size:13px;margin-bottom:12px}
  .wg-steps{display:flex;flex-direction:column;gap:8px}
  .wg-step{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--muted);font-size:13.5px;transition:all .25s}
  .wg-step-n{width:22px;height:22px;border-radius:50%;background:var(--line);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
  .wg-step.active{border-color:var(--accent2);color:#fff}
  .wg-step.active .wg-step-n{background:var(--accent2)}
  .wg-step.done{color:#9be39b}
  .wg-step.done .wg-step-n{background:#2e7d32}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a2f3d;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
  .empty{color:var(--muted);text-align:center;margin-top:120px}
</style>
</head>

<script>
  const DOCS = [{"id":"ch0","num":"0","title":"들어가며 — 왜 로컬 AI인가","raw":"## 0. 들어가며 — 왜 로컬 AI인가\n\n챗봇으로 AI를 쓰는 사람은 이미 많습니다. 브라우저(웹사이트를 여는 프로그램)나 앱에서 ChatGPT, Claude, Gemini 같은 AI에게 질문하고, 답을 받고, 그 답을 복사해 글이나 기획서에 옮기는 방식입니다. 이 방식만으로도 아이디어를 얻고, 문장을 다듬고, 제목 후보를 뽑는 데 큰 도움이 됩니다.\n\n그런데 영상 제작자의 일은 대화창 안에서 끝나지 않습니다. 레퍼런스 링크, 촬영본, 자막 파일, 음성 파일, 썸네일 이미지, 업로드 문구, 폴더 정리까지 대부분의 작업물이 내 컴퓨터 어딘가에 있습니다. **AI가 “좋은 답변”만 해주는 단계를 넘어 실제 파일과 작업 흐름을 다룰 수 있다면, 할 수 있는 일이 훨씬 많아집니다.**\n\n이 자료집에서 말하는 로컬 AI는 반드시 “인터넷 없이 내 컴퓨터 안에서만 돌아가는 AI 모델”만을 뜻하지 않습니다. 더 넓게는 **내 컴퓨터를 작업 공간으로 삼아, 권한을 부여받은 범위 안에서 파일을 읽고, 만들고, 정리하고, 프로그램을 실행할 수 있는 AI 도구**를 말합니다. 도구에 따라서는 클라우드 모델(인터넷상의 서버에서 계산을 처리하는 AI 모델)을 함께 사용할 수도 있습니다.\n\n핵심 변화는 단순합니다. 챗봇 AI가 “대답하는 AI”에 가깝다면, 로컬 AI는 “일을 처리하는 AI”에 가깝습니다. 마치 내 직원에게 일을 맡기듯 자료 수집, 정리, 생성, 저장 같은 여러 단계를 이어서 맡길 수 있습니다. 물론 이것은 비유입니다. **AI가 마음대로 모든 것을 하는 것이 아니라, 사용자가 허용한 권한과 승인 범위 안에서 작동한다는 점이 중요합니다.**\n\n### 0.1 챗봇으로 쓰는 AI vs 로컬로 쓰는 AI\n\n챗봇으로 쓰는 AI는 대화창에서 답을 받는 방식입니다. 브라우저나 앱의 대화창에 “이 영상 제목을 20개 추천해 줘”라고 입력하면, AI가 제목 후보를 텍스트로 답합니다. 그다음에는 사용자가 답변을 복사해서 메모장, 문서, 스프레드시트, 편집 프로그램 등에 직접 옮겨야 합니다. **챗봇 방식은 좋은 답을 받는 데 강하지만, 그 답을 실제 작업물에 반영하는 일은 보통 사람이 이어서 처리합니다.**\n\n로컬로 쓰는 AI는 작업 위치가 대화창 안에만 머물지 않습니다. 로컬 AI 도구가 지원하고 사용자가 권한을 허용하면, 특정 폴더의 파일을 읽고 결과물을 새 파일로 저장하거나 필요한 프로그램과 명령을 실행할 수 있습니다. 여기서 권한은 프로그램이 특정 파일, 폴더, 앱, 계정에 접근해도 된다고 사용자가 허용하는 범위를 뜻합니다. **즉 로컬 AI는 권한을 부여받은 경우 내 컴퓨터의 파일과 프로그램을 다루며 실제 작업을 이어서 수행하는 방식입니다.**\n\n예를 들어 챗봇 방식에서는 “이 원고를 요약해 줘”라고 묻고, 나온 답변을 사람이 복사해야 합니다. 로컬 AI 방식에서는 권한을 허용한 작업 폴더 안에서 “이 폴더의 원고 파일들을 모두 읽고, 영상별 요약본을 만들어 별도 폴더에 저장해 줘”처럼 요청할 수 있습니다. 다만 모든 도구가 이런 기능을 지원하는 것은 아니므로, 도구별 기능과 권한 설정을 확인해야 합니다.\n\n쉽게 말해 챗봇 AI는 메신저로 조언을 주는 전문가에 가깝습니다. 로컬 AI는 허락받은 책상, 서랍, 파일철을 열어 실제 정리 업무까지 도와주는 보조 직원에 가깝습니다. **차이는 “답을 주는가”에서 끝나는지, 아니면 허용된 작업 공간 안에서 파일과 결과물까지 다루는지에 있습니다.**\n\n실제 활용에서는 이런 차이가 더 분명해집니다:\n\n- 챗봇 방식은 제목 아이디어, 대본 초안, 문장 수정, 기획 방향 상담처럼 “답변을 받아 사람이 옮기는 일”에 자주 쓰입니다.\n- 로컬 방식은 폴더 안 파일을 읽어 정리하기, 여러 개의 결과물을 한꺼번에 만들기, 파일 이름 바꾸기, 표 파일로 저장하기, 반복 작업 자동화에 쓰입니다.\n- 영상 제작에서는 대본, 자막, 썸네일 문구, 레퍼런스 목록, 업로드 설명문처럼 여러 파일로 흩어지는 작업을 한 흐름으로 묶을 때 차이가 크게 느껴집니다.\n\n비슷한 표현은 다음처럼 나누어 보면 이해하기 쉽습니다:\n\n| 구분 | 어떻게 다른가 |\n|---|---|\n| 로컬 AI 도구 vs 로컬 AI 모델 | 로컬 AI 모델은 AI 모델 자체가 내 컴퓨터에서 실행되는 경우를 뜻합니다. 로컬 AI 도구는 내 컴퓨터의 파일과 프로그램을 작업 대상으로 삼는 도구를 뜻하며, 경우에 따라 클라우드 모델을 함께 사용할 수 있습니다. |\n| 데스크톱 앱 vs 로컬 AI | 어떤 AI 서비스의 데스크톱 앱을 설치했다고 해서 자동으로 로컬 AI가 되는 것은 아닙니다. 내 파일이나 프로그램에 접근할 권한을 받고 실제 작업을 수행할 수 있어야 로컬 작업 도구에 가깝습니다. |\n| 파일 업로드 vs 폴더 접근 | 챗봇에 파일 하나를 올려 분석받는 것과, 로컬 AI가 권한을 받은 폴더 안의 여러 파일을 읽고 정리하는 것은 다릅니다. 후자는 작업 범위와 자동화 가능성이 더 넓습니다. |\n\n### 0.2 로컬 AI가 열어주는 가능성 — “내 직원처럼 일하는 AI”\n\n로컬 AI가 “내 직원처럼 일한다”는 말은 AI가 사람처럼 책임을 진다는 뜻이 아닙니다. **권한과 승인 범위 안에서 자료 수집, 정리, 생성, 저장 같은 여러 단계를 이어서 처리할 수 있다는 뜻입니다.** 챗봇 AI가 보통 한 번의 질문에 한 번의 답변을 준다면, 로컬 AI 도구는 기능과 권한이 허용되는 경우 목표를 받아 여러 단계를 이어서 수행할 수 있습니다. 예를 들어 “이 폴더의 인터뷰 대본을 읽고, 핵심 발언을 뽑고, 쇼츠 아이디어 30개를 만든 뒤, CSV 파일로 저장해 줘”처럼 요청할 수 있습니다. CSV는 엑셀이나 스프레드시트에서 열 수 있는 표 형식 파일입니다.\n\n“내 직원처럼”이라는 표현은 사용자가 일을 지시하고, 작업 범위를 정하고, 중요한 결정은 승인하는 구조에 더 가깝습니다. 좋은 직원에게 업무 매뉴얼과 접근 권한을 주듯이, 로컬 AI에도 어떤 폴더를 다뤄도 되는지, 어떤 결과물을 원하는지, 어디까지 자동으로 해도 되는지를 알려주어야 합니다. **지능이 높아지는 것과 권한이 자동으로 생기는 것은 별개의 문제입니다.**\n\n작업 환경이 정리되어 있을수록 로컬 AI가 할 수 있는 일도 늘어납니다. 폴더 이름, 파일 이름, 결과물 저장 위치, 승인 규칙이 분명하면 AI가 처리할 수 있는 범위가 넓어집니다. 반대로 자료가 뒤섞여 있거나 지시가 모호하면, AI가 만든 결과를 사람이 다시 정리해야 할 수 있습니다. **로컬 AI를 잘 쓰는 일은 AI에게 일을 맡기기 전에 작업 공간을 알아보기 쉽게 만드는 일과도 연결됩니다.**\n\n챗봇 AI가 “이렇게 하면 좋겠습니다”라고 말하는 조언자라면, 로컬 AI는 “말씀하신 폴더에서 자료를 찾아 정리해 두었습니다”라고 보고하는 보조 직원에 가깝습니다. 다만 회사 규칙과 권한이 없는 직원이 마음대로 결제하거나 업로드할 수 없듯, AI도 허용된 범위 안에서만 움직여야 합니다.\n\n영상 제작 흐름에서는 대표적으로 이런 일들에 활용할 수 있습니다:\n\n- 자료 수집에서는 특정 주제의 레퍼런스 링크, 제목, 썸네일 문구, 조회 가능한 공개 정보를 정리할 수 있습니다. 단, 웹사이트 이용 약관과 저작권 범위 안에서 다뤄야 합니다.\n- 정리에서는 여러 원고, 자막, 메모 파일을 읽고 주제별로 분류하거나 요약할 수 있습니다.\n- 생성에서는 제목 후보, 썸네일 문구, 영상 설명란, 쇼츠 아이디어, 이미지 생성용 프롬프트를 만들 수 있습니다. 프롬프트는 AI에게 원하는 결과를 설명하는 지시문입니다.\n- 저장에서는 결과를 문서, 표, 마크다운 파일, 폴더 구조 등으로 저장할 수 있습니다. 마크다운은 제목과 목록을 간단한 기호로 표시하는 문서 형식입니다.\n- 반복 처리에서는 파일 이름 바꾸기, 자막 포맷 정리, 결과물 목록 만들기처럼 사람이 반복해서 눌러야 했던 일을 줄일 수 있습니다.\n\n비슷해 보이지만 꼭 구분해야 하는 지점도 있습니다:\n\n| 구분 | 어떻게 다른가 |\n|---|---|\n| 자동화 vs 완전 방치 | 자동화는 반복 작업을 정해진 순서로 처리하게 만드는 것입니다. 완전히 검토 없이 방치한다는 뜻은 아닙니다. |\n| 지능 vs 권한 | AI가 똑똑하다고 해서 자동으로 내 파일을 읽을 수 있는 것은 아닙니다. 파일 접근, 프로그램 실행, 계정 연결은 별도의 권한이 필요합니다. |\n| 생성 vs 실행 | AI가 업로드 문구를 생성하는 것과 실제로 SNS에 업로드하는 것은 다릅니다. 실제 게시, 삭제, 결제, 외부 발송 같은 작업은 승인 단계를 두는 것이 안전합니다. |\n\n### 0.3 영상 크리에이터에게 로컬 AI가 특히 강력한 이유\n\n영상 크리에이터의 업무는 대량의 파일, 반복 작업, 여러 도구 사이의 이동이 많습니다. 그래서 로컬 AI는 자료 정리부터 생성, 편집 보조, 업로드 준비까지 큰 도움을 줄 수 있습니다. **영상 제작의 많은 과정이 결국 파일과 폴더를 중심으로 움직이기 때문입니다.**\n\n영상 제작은 창의적인 일처럼 보이지만, 실제로는 반복적이고 양이 많은 작업이 매우 많습니다. 레퍼런스를 찾고, 대본을 정리하고, 자막을 맞추고, 썸네일 후보를 만들고, 결과물을 비교하고, 업로드 문구를 준비하는 과정이 계속 이어집니다. 이 작업 흐름, 즉 워크플로는 대부분 파일과 폴더를 중심으로 움직입니다.\n\n로컬 AI가 강력한 이유는 바로 이 지점에 있습니다. 권한을 허용한 작업 폴더 안에서 AI가 여러 파일을 읽고, 필요한 결과물을 만들고, 정해진 위치에 저장할 수 있다면 제작자는 반복 작업보다 판단과 선택에 더 많은 시간을 쓸 수 있습니다. **로컬 AI는 창작자의 최종 감각을 대신한다기보다, 창작자가 고를 수 있는 선택지를 빠르게 준비해 주는 역할에 가깝습니다.**\n\n특히 영상 크리에이터는 텍스트, 이미지, 음성, 영상이 모두 섞인 작업을 합니다. 로컬 AI 도구가 지원하는 범위 안에서는 자막 파일, 음성 인식 결과, 이미지 후보, 영상 클립 정보, 업로드 문구를 한 프로젝트 단위로 묶어 다루기 좋습니다. 그래서 단순히 “대본을 잘 써주는 AI”보다 “내 프로젝트 폴더 안에서 일을 정리해 주는 AI”의 가치가 크게 느껴질 수 있습니다.\n\n쉽게 말하면 영상 크리에이터는 감독이자 PD이고, 로컬 AI는 자료 조사원, 조연출, 편집 보조, 업로드 매니저를 조금씩 맡는 보조 직원에 가깝습니다. **최종 선택은 사람이 하되, 고를 후보와 정리된 자료를 AI가 미리 준비해 두는 구조입니다.**\n\n구체적으로는 이런 장면에서 자주 쓰입니다:\n\n- 레퍼런스 영상 대량 수집에서는 공개적으로 접근 가능한 범위에서 레퍼런스 링크, 제목, 썸네일 문구, 주제, 포맷을 표로 정리할 수 있습니다. 플랫폼 약관과 저작권을 확인하는 전제가 필요합니다.\n- 이미지·영상 생성 보조에서는 썸네일 콘셉트, 이미지 생성 프롬프트, 영상 생성 프롬프트, 변형안 목록을 만들고 결과물을 폴더별로 정리할 수 있습니다.\n- 자막·음성 처리에서는 음성을 글자로 바꾸는 STT, 글자를 음성으로 바꾸는 TTS 도구와 연결해 대본, 자막, 내레이션 파일을 정리할 수 있습니다. 도구별 지원 여부는 확인이 필요합니다.\n- 결과물 셀렉용 갤러리 제작에서는 여러 썸네일 후보나 이미지 결과물을 한 화면에서 비교할 수 있는 간단한 갤러리 파일을 만들 수 있습니다. 예를 들어 브라우저에서 열리는 HTML 목록 페이지 형태가 될 수 있습니다.\n- SNS 업로드 준비에서는 제목, 설명란, 해시태그, 고정 댓글, 짧은 소개문을 플랫폼별로 나눠 준비할 수 있습니다. 실제 자동 업로드는 플랫폼 API(서비스가 외부 프로그램과 연결되도록 제공하는 공식 통로), 계정 권한, 정책이 허용되는 경우에만 가능합니다.\n- 프로젝트 관리에서는 촬영본, 편집본, 썸네일, 자막, 업로드 문구를 프로젝트별 폴더로 정리하고 누락된 파일을 확인하는 데 쓸 수 있습니다.\n\n마지막으로, 로컬 AI를 영상 제작에 활용할 때도 비슷한 개념을 구분해 두면 좋습니다:\n\n| 구분 | 어떻게 다른가 |\n|---|---|\n| AI 영상 생성 vs 영상 제작 자동화 | AI 영상 생성은 새로운 영상이나 이미지를 만들어 내는 일에 가깝습니다. 영상 제작 자동화는 레퍼런스 수집, 파일 정리, 자막 처리, 업로드 준비처럼 제작 전후의 흐름을 줄이는 일까지 포함합니다. |\n| 편집을 대신함 vs 편집 보조 | 로컬 AI가 모든 편집 감각을 대신한다기보다는, 컷 목록 정리, 자막 초안, 썸네일 후보, 설명문 작성처럼 편집자가 판단하기 전의 준비 작업을 줄여 줍니다. |\n| 업로드 가능 vs 항상 허용 | 어떤 도구가 업로드 기능을 제공하더라도, 각 플랫폼의 정책, API 권한, 계정 설정에 따라 가능 여부가 달라질 수 있습니다. 공개 게시 전에는 승인 단계를 두는 것이 좋습니다. |\n\n### 참고\n\n서비스 정책과 권한 관련 정보는 바뀔 수 있으므로, 실제로 사용하기 전에는 아래 항목을 확인하는 편이 좋습니다:\n\n- ChatGPT, Claude, Gemini 등 개별 서비스의 파일 처리, 데스크톱 앱, 커넥터, 데이터 사용 정책은 바뀔 수 있습니다. (2026-05 기준, 공식 문서 확인 필요)\n- 로컬 AI 도구의 파일 접근, 명령 실행, 외부 계정 연결 권한은 도구와 운영체제 설정에 따라 달라집니다. 중요한 작업 폴더와 민감한 파일은 권한 범위를 나누어 관리하는 것이 좋습니다.\n- 로컬 AI에게 맡길 작업은 “읽기만 가능”, “새 파일 생성 가능”, “기존 파일 수정 가능”, “외부 서비스 업로드 가능”처럼 권한 단계를 나누어 생각하면 좋습니다.\n- 삭제, 덮어쓰기, 공개 업로드처럼 되돌리기 어려운 작업은 사용 중인 도구의 승인 기능과 로그 기록 기능을 확인하는 것이 좋습니다. (2026-05 기준, 공식 문서 확인 필요)\n- YouTube, Instagram, TikTok 등 플랫폼의 자동 업로드, 예약 게시, 데이터 접근 정책은 변동될 수 있습니다. (2026-05 기준, 공식 API 문서와 이용 약관 확인 필요)\n- 저작권, 초상권, 음원 사용권은 자동화 여부와 관계없이 확인해야 합니다. 로컬 AI는 작업을 빠르게 해줄 수 있지만, 공개 콘텐츠의 책임과 최종 판단은 제작자에게 남습니다.\n\n---\n"},{"id":"ch1","num":"1","title":"로컬 AI 도구의 종류","raw":"## 1. 로컬 AI 도구의 종류\n\n여기서 말하는 “로컬 AI”는 AI 모델이 반드시 내 컴퓨터 안에서만 돌아간다는 뜻은 아닙니다. 초급 단계에서는 **내 컴퓨터의 파일·폴더·프로그램과 연결되어, 권한을 부여받은 범위에서 작업을 도와주는 AI**로 이해하시면 됩니다.\n\n챗봇이 답변을 적어주는 도구라면, 로컬 작업 환경의 AI는 원고 폴더를 살피고, 자막 파일을 정리하고, 업로드용 설명문을 만들고, 반복 작업을 자동화하는 흐름까지 이어갈 수 있습니다. 중요한 기준은 제품 이름을 외우는 것이 아니라 **AI가 어느 작업 공간에 붙어 일하는가**입니다.\n\n파일 보기, 파일 수정, 명령 실행, 외부 도구 연결은 모두 사용자가 권한을 부여한 경우에만 가능하다고 이해하는 것이 안전합니다. **구체 기능·가격·지원 운영체제·권한 정책은 2026-05 기준으로도 변동 가능하므로 공식 문서 확인이 필요합니다.**\n\n### 1.1 Claude Desktop\n\nClaude Desktop은 Anthropic의 Claude를 웹브라우저가 아니라 컴퓨터에 설치한 데스크톱 앱에서 사용하는 방식입니다. **권한을 부여받은 파일·도구 연결을 통해 로컬 작업에 붙여 쓸 수 있다는 점이 핵심입니다.**\n\n설정에 따라 Claude Desktop은 MCP(Model Context Protocol: AI 앱이 외부 도구와 주고받는 방법을 정한 연결 규칙)를 통해 파일 시스템이나 다른 도구와 연결될 수 있습니다. 다만 어떤 폴더를 읽고 쓸 수 있는지, 어떤 도구를 연결할 수 있는지는 사용자가 부여한 권한과 앱·운영체제 정책에 따라 달라집니다. 구체 기능, 지원 OS, 요금, 권한 정책은 2026-05 기준 공식 문서 확인이 필요합니다.\n\n쉽게 떠올리면 웹 채팅창에 말만 거는 것이 아니라, 직원에게 특정 책상과 서류함, 업무 도구 사용 권한을 주는 느낌입니다. **사무실 전체가 아니라 허용한 서랍과 도구부터 다룬다고 이해하시면 안전합니다.**\n\n영상 크리에이터는 Claude Desktop을 원고 폴더, 자막 파일, 기획안, 업로드 설명문 템플릿과 함께 쓰는 상황에서 마주칠 수 있습니다. 예를 들어 권한을 부여한 폴더 안의 대본을 요약하거나, 여러 편의 영상 제목 후보를 정리하거나, 자막 파일의 말투를 통일하는 식의 작업에 활용될 수 있습니다. MCP로 연결 가능한 도구가 준비되어 있다면, 단순 대화보다 한 단계 더 실제 작업 흐름에 가까운 방식으로 사용할 수 있습니다.\n\nClaude 웹과 Claude Desktop은 둘 다 Claude 모델을 사용할 수 있지만, Claude Desktop은 데스크톱 앱과 로컬 도구 연결을 중심으로 설정할 수 있다는 점이 다릅니다. Claude 모델은 “두뇌”에 가깝고, Claude Desktop은 그 두뇌를 컴퓨터 작업 공간에 앉히는 “앱”에 가깝습니다. MCP와 API(API: 프로그램끼리 요청과 응답을 주고받는 연결 통로)도 헷갈리기 쉬운데, MCP는 AI 앱이 여러 도구를 붙이기 쉽게 하려는 연결 규칙에 가깝고, API는 서비스끼리 직접 연결할 때 넓게 쓰이는 통신 방식입니다.\n\n### 1.2 Codex\n\nCodex는 OpenAI 계열에서 코드·프로젝트 파일 작업을 맡기기 위한 도구나 환경 이름으로 언급됩니다. **제공 형태는 시기와 문맥에 따라 달라질 수 있으므로 공식 문서 확인이 필요한 항목입니다.**\n\nCodex라는 이름은 문맥에 따라 코드 생성 모델, 코드 작업용 에이전트, CLI(CLI: 명령어를 글자로 입력해 프로그램을 다루는 방식), 웹 또는 IDE(통합 개발 환경: 파일 편집·실행·확인을 한 화면에서 하는 프로그램) 연동 형태로 언급될 수 있습니다. 비개발자에게 중요한 점은 Codex를 “코딩 전용 챗봇”이라기보다 프로젝트 폴더 안의 파일 수정, 오류 확인, 반복 작업 자동화를 맡기는 작업 환경 후보로 이해하는 것입니다. 웹에서 실행되는지, 내 컴퓨터의 터미널(명령어 입력 창)에서 실행되는지, IDE에 붙는지는 시기와 제공 방식에 따라 달라질 수 있으며, 파일 접근과 명령 실행은 권한을 부여받은 범위에서만 가능하다고 보는 것이 안전합니다.\n\n비유하자면 직원에게 “이 폴더의 자동화 작업을 정리해 주세요”, “오류가 왜 나는지 봐 주세요”, “반복 작업을 줄이는 스크립트를 만들어 주세요”라고 맡기는 느낌입니다. **다만 그 직원이 웹에서 일하는지, 내 컴퓨터 안의 명령어 창에서 일하는지, 기존 편집기 안에서 일하는지는 공식 문서로 확인해야 합니다.**\n\n영상 크리에이터는 Codex를 자막 변환, 파일 이름 일괄 정리, 쇼츠 클립 목록 생성, 업로드 메타데이터 CSV 정리, ffmpeg(ffmpeg: 영상·오디오 변환과 처리를 명령어로 수행하는 도구) 명령 작성 같은 자동화 작업에서 마주칠 수 있습니다. 특히 내 영상 제작 과정을 반복 가능한 프로젝트로 만들고 싶을 때, 코드와 파일을 함께 다루는 도구가 필요해질 수 있습니다. 코딩을 직접 잘 몰라도 오류 메시지를 설명받거나, 기존 자동화 파일을 수정하는 보조 역할로 사용할 수 있습니다.\n\nCodex와 ChatGPT는 둘 다 OpenAI 계열로 언급될 수 있지만, ChatGPT가 대화 중심으로 익숙하다면 Codex는 코드·파일 작업 환경 쪽으로 이해하는 것이 좋습니다. Codex와 Claude Desktop은 제공사와 중심 용도가 다르며, 어느 쪽이 더 좋다기보다 어떤 작업 공간에 붙여 쓸지의 차이로 보는 편이 안전합니다. Codex와 VS Code 익스텐션도 구분해야 하는데, Codex는 특정 도구나 환경 이름으로 언급되는 반면 VS Code 익스텐션은 기존 편집기에 AI 기능을 붙이는 사용 방식입니다.\n\n### 1.3 Antigravity\n\nAntigravity는 AI IDE 또는 프로젝트 작업 환경으로 언급되는 도구명입니다. **설치 방식과 로컬 권한은 공식 문서 확인이 특히 필요한 항목입니다.**\n\nAI IDE는 인공지능이 결합된 통합 개발 환경으로, 프로젝트 파일, AI 채팅, 실행 결과, 터미널 등을 한 화면에서 다루도록 설계된 작업 공간을 뜻합니다. Antigravity는 이런 AI IDE 또는 프로젝트 작업 환경으로 언급될 수 있으나, 제품 변경 가능성이 큰 영역입니다. 따라서 설치 방식, 지원 운영체제, 로그인 계정, 파일 접근 범위, 명령 실행 지원 여부를 공식 문서에서 확인해야 합니다. 영상 크리에이터 입장에서는 내 작업 자동화 프로젝트를 통째로 관리하는 작업실 후보로 볼 수 있지만, 실제 기능은 2026-05 기준 공식 문서 확인이 필요합니다.\n\n쉽게 말하면 새 편집실을 통째로 빌리는 느낌입니다. **그 안에 AI 직원, 파일장, 실행 버튼, 확인 화면이 함께 있을 수 있지만, 어떤 장비가 포함되는지는 공식 안내를 보고 확인해야 합니다.**\n\nAntigravity 같은 AI IDE형 도구는 영상 제작 자동화 프로젝트를 하나의 작업실처럼 관리하고 싶을 때 등장할 수 있습니다. 예를 들어 자료 수집, 원고 생성, 자막 정리, 영상 처리 명령, 업로드 전 검수 목록을 한 프로젝트 폴더 안에서 관리하는 식입니다. 단, 실제로 파일을 읽거나 수정하는지, 명령을 실행할 수 있는지, 외부 서비스와 연결되는지는 권한 설정과 제품 정책에 따라 달라집니다.\n\nAntigravity와 AI IDE는 구분해야 합니다. AI IDE는 도구의 “종류”이고, Antigravity는 그 종류로 언급되는 “제품명”입니다. Antigravity와 VS Code 익스텐션도 다릅니다. Antigravity는 별도의 프로젝트 작업 환경으로 제공될 수 있는 반면, VS Code 익스텐션 방식은 이미 있는 VS Code 안에 AI 기능을 붙이는 방식입니다. 또한 AI IDE라고 해서 반드시 AI 모델이 내 컴퓨터 안에서만 실행된다는 뜻은 아니므로, 로컬 파일 접근과 모델 실행 위치를 따로 확인해야 합니다.\n\n### 1.4 VS Code 익스텐션으로 쓰는 방식\n\nVS Code 익스텐션 방식은 Visual Studio Code 안에 AI 확장을 설치해 쓰는 방식입니다. **기존 편집기에서 파일·프로젝트 작업을 보조받는 사용 방식이라고 이해하시면 됩니다.**\n\nVS Code(Visual Studio Code: 무료로 많이 쓰이는 코드 편집기)는 본래 개발자가 파일을 열고 수정하는 도구입니다. 익스텐션(확장: 기본 프로그램에 기능을 추가하는 작은 부가 도구)을 설치하면 AI 채팅, 코드 수정 제안, 프로젝트 검색, 터미널 명령 안내 같은 기능을 같은 화면에서 사용할 수 있습니다. 이 방식은 Claude Desktop, Codex, Antigravity처럼 하나의 독립 도구를 말한다기보다, 기존 편집기 안에 AI 기능을 붙이는 사용 방식입니다. 어떤 모델을 쓰는지, 파일 접근이나 명령 실행 권한이 있는지, 결제와 로그인 방식이 무엇인지는 각 익스텐션별로 2026-05 기준 공식 문서 확인이 필요합니다.\n\n비유하면 이미 쓰는 공책에 AI 포스트잇을 붙이는 느낌입니다. **공책은 VS Code이고, 포스트잇 역할을 하는 것이 AI 익스텐션입니다.**\n\n영상 크리에이터는 프롬프트 모음, 대본 템플릿, 자막 처리 파일, 자동화 스크립트, 업로드 설명문 양식을 한 폴더에 모아 관리할 때 VS Code를 만날 수 있습니다. 여기에 AI 익스텐션을 붙이면 권한을 부여한 작업 폴더 안에서 파일을 설명받거나, 수정 제안을 받거나, 반복 작업용 코드를 만드는 도움을 받을 수 있습니다. 코딩을 전문적으로 하지 않더라도 내 영상 제작용 작업 폴더를 체계적으로 관리하는 도구로 접근할 수 있습니다.\n\nVS Code와 VS Code 익스텐션은 다릅니다. VS Code는 기본 편집기이고, 익스텐션은 그 위에 추가하는 기능입니다. VS Code 익스텐션 방식과 로컬 모델도 다릅니다. 익스텐션을 쓴다고 해서 AI 모델이 반드시 내 컴퓨터 안에서 실행되는 것은 아니며, 클라우드 모델을 호출할 수도 있습니다. 또한 익스텐션이 MCP를 지원할 수는 있지만, 익스텐션 자체가 곧 MCP라는 뜻은 아닙니다.\n\n### 1.5 한눈에 비교 (어떤 상황에 무엇을)\n\n여러 로컬 AI 도구를 볼 때는 성능 순서보다 작업 공간을 기준으로 나누는 편이 이해하기 쉽습니다. **핵심은 AI를 어느 작업 공간에 붙이는가입니다.**\n\n로컬 AI 도구를 고를 때 첫 질문은 “어느 모델이 가장 좋은가”보다 “내 작업 파일이 어디에 있고, AI에게 어디까지 권한을 줄 것인가”입니다. Claude Desktop, Codex, Antigravity는 각각 이름을 가진 도구나 환경으로 이해하면 되고, VS Code 익스텐션은 기존 편집기 안에 AI를 붙이는 사용 방식입니다. 아래 비교는 성능 순위가 아니라 역할과 상황을 나눈 것이며, 2026-05 기준 공식 문서 확인이 필요합니다.\n\n쉽게 말하면 직원을 뽑는 문제라기보다, 직원이 일할 자리를 어디에 마련할지 정하는 문제입니다. **채팅방에 앉힐지, 프로젝트 작업실에 앉힐지, 기존 편집 책상 옆에 붙일지의 차이입니다.**\n\n아래 표는 **2026-05 기준, 공식 문서 확인 필요 / 예시적 비교**입니다. 실제 기능, 가격, 지원 OS, 권한 정책은 달라질 수 있습니다:\n\n| 구분 | 성격 | 영상 크리에이터에게 보이는 모습 | 권한·로컬 작업에서 확인할 점 | 선택 힌트 | 기준 |\n|---|---|---|---|---|---|\n| Claude Desktop | Anthropic의 Claude를 데스크톱 앱으로 쓰며, MCP 등 도구 연결을 설정할 수 있는 형태 | 대화창을 중심으로 원고, 자막, 기획안, 설명문 템플릿을 정리하도록 요청 | 어떤 폴더를 읽고 쓸 수 있는지, MCP 연결이 가능한지, 파일 수정 권한이 있는지 확인 | 채팅 중심으로 쓰되, 로컬 파일·도구 연결을 곁들이고 싶을 때 후보 | 2026-05 기준, 공식 문서 확인 필요 / 예시적 비교 |\n| Codex | OpenAI 계열의 코드·파일 작업용 도구나 환경으로 언급됨 | 자동화 스크립트, 프로젝트 폴더 수정, 오류 설명, 반복 작업 정리에 사용될 수 있음 | 웹·CLI·IDE 중 어떤 형태인지, 명령 실행 위치가 로컬인지 원격인지, 파일 접근 범위가 어디까지인지 확인 | 영상 제작 자동화 파일이나 코드 중심 프로젝트를 맡기고 싶을 때 후보 | 2026-05 기준, 공식 문서 확인 필요 / 예시적 비교 |\n| Antigravity | AI IDE 또는 프로젝트 작업 환경으로 언급됨 | 파일, AI 채팅, 실행 결과, 터미널이 한 작업실에 모인 형태로 보일 수 있음 | 설치 방식, 지원 OS, 로그인 계정, 로컬 파일 접근, 명령 실행 여부, 데이터 정책 확인 | 자동화 프로젝트 전체를 AI 중심 작업실에서 관리하고 싶을 때 후보 | 2026-05 기준, 공식 문서 확인 필요 / 예시적 비교 |\n| VS Code 익스텐션 방식 | VS Code라는 기존 편집기에 AI 확장을 붙이는 사용 방식 | 작업 폴더를 열어 둔 상태에서 AI 패널이나 채팅창으로 파일 설명·수정 제안을 받음 | 익스텐션 제공사, 사용 모델, 인증키 필요 여부, 작업 폴더 접근 범위, 터미널 권한 확인 | 이미 폴더 기반으로 작업물을 관리하거나, 기존 편집기에 AI 기능만 추가하고 싶을 때 후보 | 2026-05 기준, 공식 문서 확인 필요 / 예시적 비교 |\n\n간단히 정리하면, 상황별 후보는 이렇게 볼 수 있습니다:\n\n- **대화창 중심 + 로컬 도구 연결**을 원하면 Claude Desktop 계열을 살펴볼 수 있습니다.\n- **코드·파일 작업 자동화**가 중심이면 Codex 같은 코드 작업 환경을 확인할 수 있습니다.\n- **프로젝트 작업실 자체를 AI 중심으로 구성**하고 싶으면 Antigravity 같은 AI IDE형 도구를 검토할 수 있습니다.\n- **기존 편집기 안에 AI 기능만 추가**하고 싶으면 VS Code 익스텐션 방식이 후보가 됩니다.\n\n가장 많이 헷갈리는 부분은 “도구”와 “사용 방식”입니다. Claude Desktop, Codex, Antigravity는 특정 이름으로 불리는 도구나 환경에 가깝고, VS Code 익스텐션은 VS Code 안에 AI 기능을 붙이는 방식입니다. 또 “로컬 작업 환경”과 “로컬 모델”도 다릅니다. 내 컴퓨터의 파일과 연결된다고 해서 AI 모델이 반드시 내 컴퓨터 안에서만 실행된다는 뜻은 아니므로, 모델 실행 위치와 파일 접근 권한을 따로 확인해야 합니다.\n\n## 참고\n\n본문에서 언급한 공식 확인 경로와 확인할 항목은 다음과 같습니다:\n\n- Claude 공식 다운로드: https://claude.ai/download  \n  2026-05 기준 확인 필요.\n- Anthropic 공식 문서: https://docs.anthropic.com/  \n  2026-05 기준 확인 필요.\n- MCP 공식 문서: https://modelcontextprotocol.io/  \n  2026-05 기준 확인 필요.\n- OpenAI 공식 사이트: https://openai.com/  \n  Codex 관련 제공 형태는 2026-05 기준 확인 필요.\n- OpenAI Developers 문서: https://platform.openai.com/docs/  \n  2026-05 기준 확인 필요.\n- OpenAI 공식 GitHub 조직: https://github.com/openai  \n  CLI나 저장소 제공 여부는 2026-05 기준 확인 필요.\n- Antigravity 공식 사이트·문서: 제공사 공식 채널에서 최신 설치 안내 확인 필요.  \n  2026-05 기준 확인 필요.\n- Antigravity 공식 문서에서 확인할 항목: 설치 방식, 지원 OS, 계정 로그인 방식, 로컬 파일 접근 범위, 터미널·명령 실행 여부, 데이터 처리 정책, 요금 정책.\n- 제품명이 같은 비공식 자료나 광고성 다운로드가 섞일 수 있으므로, Antigravity 설치 파일은 공식 도메인이나 공식 저장소에서만 확인하는 것이 안전합니다.\n- VS Code 공식 문서: https://code.visualstudio.com/docs  \n  2026-05 기준 확인 필요.\n- VS Code Marketplace: https://marketplace.visualstudio.com/vscode  \n  익스텐션별 기능·권한·요금은 2026-05 기준 확인 필요.\n- 각 AI 익스텐션의 공식 문서에서 확인할 항목: 사용 모델, 로그인 방식, API key(API key: 외부 서비스 접속에 쓰는 인증키) 필요 여부, 작업 폴더 접근 범위, 터미널 실행 권한, 데이터 처리 정책.\n- 이 비교는 성능 순위가 아니라 역할 비교입니다.  \n  2026-05 기준, 공식 문서 확인 필요 / 예시적 비교.\n- 공식 문서에서 공통으로 확인할 항목: 설치 방식, 지원 운영체제, 로그인 계정, 요금, 로컬 파일 접근 범위, 명령 실행 가능 여부, 외부 서비스 연결 방식, 데이터 처리 정책.\n- 파일 보기·수정·명령 실행·업로드 관련 작업은 항상 사용자가 권한을 부여한 범위에서만 가능하다고 이해하는 것이 안전합니다.\n\n---\n"},{"id":"ch2","num":"2","title":"꼭 알아야 할 핵심 단어 — 층위별 정리","raw":"## 2. 꼭 알아야 할 핵심 단어 — 층위별 정리\n\n로컬 AI를 쓰기 시작하면 비슷해 보이는 단어가 한꺼번에 등장합니다. 이때 중요한 기준은 단어를 외우는 것이 아니라, **같은 층위의 단어끼리 묶어 보는 것**입니다. API와 MCP는 연결 규칙의 말이고, 토큰과 컨텍스트는 AI가 정보를 처리하는 방식의 말이며, bash와 command는 컴퓨터에 명령을 내리는 방식의 말입니다.\n\n로컬 AI가 파일을 보거나 명령을 실행하는 경우는 언제나 조건이 붙습니다. **그런 기능이 있는 도구를 사용하고, 사용자가 권한을 부여한 경우**에만 가능합니다. 단어의 층위를 나누면 “AI가 생각하는 것”, “AI가 외부와 연결되는 것”, “컴퓨터가 실행하는 것”을 훨씬 덜 헷갈리게 볼 수 있습니다.\n\n### 2.1 층위 1 · AI와 외부를 잇는 것들\n\n이 층위의 단어들은 AI가 자기 바깥의 파일, 앱, 웹서비스, 작업 절차와 만나는 통로를 설명합니다. 연결 규칙, 연결 문서, 실행 권한을 다루는 말들이며, AI의 내부 처리 방식이나 개발 언어 이름과는 다른 층위입니다.\n\n### CLI\n\nCLI(Command Line Interface)는 버튼 대신 글자 명령으로 프로그램을 조작하는 방식입니다. **마우스로 클릭하는 앱 화면이 아니라, 터미널에 명령을 입력해 프로그램을 다루는 방식**이라고 보면 됩니다. 로컬 AI 도구나 영상 변환 도구는 CLI 형태로 설치되거나 실행되는 경우가 많습니다.\n\nCLI 자체가 권한을 뜻하지는 않습니다. 실제로 무엇을 할 수 있는지는 실행되는 프로그램과 사용자가 부여한 권한에 따라 달라집니다. 비유하면, 앱 화면의 버튼을 누르는 대신 글자로 “이 버튼을 눌러 주세요”라고 지시하는 방식에 가깝습니다.\n\n영상 작업에서는 이런 형태로 자주 마주칩니다:\n\n- 로컬 AI 도구 실행\n- 영상 파일 변환\n- 자막 파일 생성\n- `tool-name input.mp4` 같은 명령 실행\n\n비슷한 말과 나란히 놓으면 구분이 쉬워집니다. **터미널은 명령을 입력하는 창이고, Shell은 명령을 해석하는 프로그램이며, command는 실제 입력 문장입니다.** CLI는 이 모든 것을 포함해 글자 명령으로 프로그램을 조작하는 방식 전체를 뜻합니다.\n\n### API\n\nAPI(Application Programming Interface)는 프로그램끼리 기능이나 데이터를 주고받기 위해 정한 약속입니다. **한 프로그램이 다른 프로그램에게 “이 데이터를 주세요”, “이 작업을 해 주세요”라고 요청할 때 따르는 규칙**입니다.\n\n예를 들어 영상 플랫폼의 데이터, 캘린더, 클라우드 저장소, 번역 서비스 등을 자동화에 연결할 때 API를 만날 수 있습니다. API를 쓰려면 API 키나 인증 토큰처럼 권한을 증명하는 값이 필요할 수 있습니다. 사람끼리 전화번호와 통화 예절이 있어야 연락할 수 있듯이, 프로그램끼리도 약속된 연락 방법이 필요하고 그 약속이 API입니다.\n\n크리에이터 작업에서는 이런 곳에 쓰입니다:\n\n- 영상 업로드 자동화\n- 댓글 수집\n- 조회수 데이터 가져오기\n- 자막 번역 요청\n- 썸네일 생성 서비스 호출\n\nAPI와 MCP는 자주 함께 보이지만 같은 말은 아닙니다. **API는 프로그램끼리 주고받는 넓은 약속이고, MCP는 AI 앱과 외부 도구를 잇기 위해 표준화한 방식**입니다. MCP가 API를 대체하는 것이 아니라, MCP 서버가 뒤에서 기존 API를 호출할 수도 있습니다. 또 API의 인증 토큰은 로그인·권한을 위한 값이고, AI 토큰은 글자 조각 처리 단위라서 전혀 다른 뜻입니다.\n\n### MCP\n\nMCP(Model Context Protocol)는 AI 앱이 외부 도구와 데이터를 다루기 쉽게 연결하기 위한 표준화된 프로토콜입니다. 여기서 프로토콜은 **서로 데이터를 주고받기 위해 정한 공통 규칙**에 가깝습니다.\n\nMCP는 AI 앱이 파일, 데이터베이스, 브라우저, 업무 도구 같은 외부 자원과 연결될 때 공통된 방식으로 주고받게 해줍니다. MCP 서버는 꼭 인터넷 어딘가에 있는 서버만 뜻하지 않습니다. 내 컴퓨터에서 실행되는 로컬 프로그램일 수도 있고, 외부 서비스와 연결된 서버일 수도 있습니다.\n\n다만 MCP는 연결 방식을 표준화하는 것이지, 안전을 자동으로 보장하는 장치는 아닙니다. **실제로 어디까지 동작할 수 있는지는 권한 설정과 AI 앱의 구현에 따라 달라집니다.** 비유하면 여러 외부 도구를 AI가 알아듣기 쉬운 공통 플러그 모양으로 꽂게 해주는 연결 규격에 가깝습니다.\n\n로컬 AI 앱에서는 이런 표현으로 자주 보게 됩니다:\n\n- “MCP server 추가”\n- “filesystem MCP”\n- “browser MCP”\n- “database MCP”\n- AI가 권한을 부여받은 폴더의 파일을 읽는 설정\n- AI가 작업 도구의 데이터를 가져오게 하는 설정\n\nAPI, Skill, 권한과도 구분해 두면 좋습니다. API는 프로그램끼리 주고받는 넓은 약속이고, MCP는 그중에서도 AI 앱이 외부 도구를 다루기 쉽도록 만든 표준화된 연결 방식입니다. Skill은 작업 절차와 기준이고, MCP는 외부 도구와 연결하는 방식입니다. **MCP를 쓴다고 해서 자동으로 안전한 것은 아니므로, 어떤 권한을 허용했는지 확인해야 합니다.**\n\n### Skill\n\nSkill은 AI가 특정 작업을 할 때 따를 절차, 기준, 예시를 묶어 둔 작업 지침입니다. **“이런 순서로 작업하세요”, “이 기준으로 판단하세요”, “이 형식으로 결과를 내세요” 같은 내용을 담는 업무 매뉴얼**에 가깝습니다.\n\nSkill 자체는 권한이 아닙니다. 실제로 파일을 읽거나 명령을 실행하거나 API를 호출하는 일은 별도의 도구 권한이 있을 때만 가능합니다. 직원에게 “우리 채널 자막은 이런 규칙으로 만들고, 썸네일 문구는 이런 기준으로 고르세요”라고 적어 둔 문서를 주는 것과 비슷합니다.\n\n반복되는 제작 기준을 AI에게 적용할 때 Skill을 보게 됩니다:\n\n- 쇼츠 자막 스타일 규칙\n- 영상 제목 후보 생성 기준\n- 썸네일 문구 평가표\n- 업로드 설명문 작성 순서\n\nSkill은 절차와 기준입니다. MCP나 API는 외부 도구와 연결하는 방식이고, 권한은 AI가 실제 파일이나 도구에 접근할 수 있게 허용하는 설정입니다. **Skill이 있다고 해서 AI가 자동으로 파일을 열거나 명령을 실행할 수 있는 것은 아닙니다.**\n\n### .md, Markdown\n\n`.md`는 Markdown 문서 파일입니다. Markdown은 제목·목록·강조 같은 문서 구조를 `# 제목`, `- 목록`, `**강조**`처럼 간단한 기호로 표현하는 형식입니다. **워드 문서보다 가볍고, 메모장보다 구조가 잘 보이는 설명서 형식**이라고 생각하면 됩니다.\n\nAI 도구는 프로젝트 안의 `CLAUDE.md`, `AGENTS.md`, `README.md` 같은 Markdown 파일을 지시문이나 설명서로 읽는 경우가 있습니다. 다만 어떤 파일을 자동으로 읽는지는 도구마다 다르며, 파일 접근은 권한과 앱 구현에 따라 달라집니다.\n\n영상 프로젝트에서도 Markdown은 꽤 유용합니다. 예를 들어 로컬 AI에게 “이 폴더에서는 이런 규칙으로 작업하세요”라고 알려주는 지시문 파일로 쓸 수 있고, 자막 규칙, 파일명 규칙, 업로드 체크리스트를 적어 둘 때도 편리합니다.\n\nMarkdown 파일은 문서입니다. 보통 그 자체가 실행되는 프로그램은 아닙니다. 스크립트는 컴퓨터가 순서대로 실행하는 명령 묶음이고, Skill의 내용이 `.md` 파일로 적혀 있을 수는 있지만 **`.md` 자체가 곧 Skill인 것은 아닙니다.**\n\n실제로 AI 도구에 주는 지시문 `.md`는 이렇게 생겼습니다:\n\n```markdown\n# 이 폴더 작업 규칙 (AGENTS.md)\n\n## 자막 규칙\n- 한 줄에 16자 이내, 두 줄까지만\n- 외래어는 한글 표기 우선\n\n## 파일명 규칙\n- YYYY-MM-DD_주제_v01.확장자\n\n## 업로드 전 체크\n- 개인정보·저작권 이미지 확인\n```\n*`#`은 제목, `-`는 목록을 뜻합니다. 사람이 읽기 쉬운 그대로 AI도 지시문으로 읽습니다.*\n\n### 도구 권한\n\n도구 권한은 AI나 프로그램이 파일, 명령어, 외부 서비스에 접근해도 되는지를 정하는 허용 범위입니다. **로컬 AI가 파일을 읽거나 명령을 실행하거나 API를 호출하려면, 해당 기능을 제공하는 도구와 사용자의 권한 허용이 필요합니다.**\n\n어떤 도구는 매번 승인하게 하고, 어떤 도구는 특정 폴더나 특정 명령만 허용하게 할 수 있습니다. 권한 구조는 AI 앱마다 다를 수 있으므로 공식 문서를 확인해야 합니다. 비유하면 직원에게 사무실 열쇠, 창고 열쇠, 회사 계정 비밀번호를 어디까지 줄지 정하는 것과 비슷합니다.\n\n실제로는 이런 승인 화면에서 자주 보게 됩니다:\n\n- “이 명령을 실행해도 될까요?”\n- “이 폴더를 읽어도 될까요?”\n- “이 MCP 서버를 허용할까요?”\n\nSkill은 일을 하는 절차이고, 권한은 실제로 접근하거나 실행해도 되는 범위입니다. MCP는 연결 방식이며, 그 연결이 안전한지는 권한 설정과 구현에 달려 있습니다. **AI가 무엇을 할 수 있는지는 ‘지침’보다 ‘허용된 권한’에 더 직접적으로 좌우됩니다.**\n\n### 2.2 층위 2 · AI가 머리 쓰는 방식\n\n이 층위의 단어들은 AI가 정보를 담고, 계산하고, 작업을 나누는 방식에 관한 말입니다. 외부 서비스와 연결하는 API/MCP나, 컴퓨터에 직접 입력하는 명령어와는 다른 층위입니다.\n\n### 컨텍스트, Context\n\n컨텍스트는 AI가 답변하거나 작업할 때 참고할 수 있는 현재 정보 묶음입니다. **AI의 책장 전체가 아니라, 지금 작업 책상 위에 펼쳐진 서류 더미**라고 보면 이해하기 쉽습니다.\n\n컨텍스트에는 대화 내용, 사용자가 붙여 넣은 자료, 도구가 읽어 온 파일 내용, 작업 지시문 등이 포함될 수 있습니다. 다만 AI가 내 컴퓨터의 모든 파일을 항상 아는 것은 아닙니다. 권한을 부여받고, 도구가 해당 정보를 불러와 컨텍스트에 넣었을 때 참고할 수 있습니다.\n\n이 단어는 이런 표현으로 자주 보게 됩니다:\n\n- “컨텍스트가 길다”\n- “컨텍스트에 파일을 추가한다”\n- “컨텍스트 윈도우가 크다”\n\n긴 대본, 여러 개의 자막 파일, 브랜드 가이드, 이전 업로드 기록을 AI가 참고하게 할 때 컨텍스트가 중요해집니다. 파일은 컴퓨터에 저장된 원본이고, 컨텍스트는 AI가 현재 참고하도록 받은 정보입니다. **메모리는 도구에 따라 장기적으로 저장되는 사용자 정보 기능을 뜻할 수 있어, 컨텍스트와 항상 같은 말은 아닙니다.**\n\n### 토큰, Token\n\n여기서 말하는 토큰은 AI가 글을 처리할 때 사용하는 작은 단위, 즉 글자 조각입니다. **AI는 문장을 사람처럼 정확히 한 글자씩 또는 한 단어씩만 세지 않고, 토큰이라는 조각 단위로 나누어 처리합니다.**\n\n한국어, 영어, 숫자, 기호에 따라 토큰으로 잘리는 방식은 달라질 수 있습니다. 컨텍스트 크기, 처리 속도, 사용량 계산에서 토큰이라는 말을 자주 보게 됩니다. 비유하면 AI가 글을 씹어 삼키기 좋게 잘라 놓은 작은 조각입니다.\n\n이런 표현에서 자주 등장합니다:\n\n- “토큰 한도 초과”\n- “200k context”\n- “입력 토큰”\n- “출력 토큰”\n- “사용량 계산”\n\n긴 대본이나 자막 파일을 한 번에 넣을 수 있는지 판단할 때 토큰 개념이 중요합니다. 다만 AI 토큰과 인증 토큰은 전혀 다릅니다. **AI 토큰은 글자 조각 처리 단위이고, 인증 토큰은 로그인이나 API 사용 권한을 증명하는 비밀 문자열**입니다. API 키, 로그인 토큰, 인증 토큰은 보안 정보이고, AI 토큰은 사용량·문맥 길이를 계산하는 단위입니다.\n\n### 에이전트, Agent\n\n에이전트는 목표를 받아 여러 단계를 스스로 계획하고 실행하는 AI 작업 방식입니다. **챗봇이 질문과 답변 중심이라면, 에이전트는 목표를 받고 필요한 단계를 나누어 처리하려는 방식**에 가깝습니다.\n\n예를 들어 “이 폴더의 영상 파일을 정리하고, 제목 후보를 만들고, 설명문 초안을 작성해 주세요”처럼 목표를 주면 에이전트는 필요한 일을 쪼개어 처리하려고 합니다. 다만 파일 읽기, 명령 실행, 외부 서비스 호출은 권한을 부여받은 경우에만 가능합니다.\n\n영상 제작 흐름에서는 여러 단계가 이어지는 작업에서 자주 보게 됩니다:\n\n- 자료 수집\n- 대본 초안 작성\n- 자막 정리\n- 썸네일 문구 후보 생성\n- 업로드 설명문 작성\n\n챗봇과 에이전트는 완전히 끊어진 개념이라기보다 정도 차이가 있습니다. 챗봇은 대화 중심이고, 에이전트는 목표 달성을 위해 계획과 실행을 더 적극적으로 합니다. **에이전트도 권한이 없으면 실제 파일 수정이나 명령 실행은 할 수 없습니다.**\n\n### 서브에이전트\n\n서브에이전트는 메인 에이전트가 일부 작업을 떼어 맡기는 보조 AI 일꾼입니다. **큰 작업을 작은 역할로 나누어 처리한다는 점이 핵심**입니다.\n\n메인 에이전트가 전체 목표를 관리하고, 서브에이전트가 조사, 검수, 요약, 코드 수정 같은 일부 작업을 맡는 구조입니다. 도구에 따라 서브에이전트가 실제로 어떻게 만들어지고 어떤 권한을 갖는지는 다를 수 있습니다.\n\n비유하면 총괄 PD가 있고, 그 아래에 자료 조사 담당, 자막 검수 담당, 썸네일 문구 담당이 따로 붙는 구조와 비슷합니다. 이런 작업에서 서브에이전트를 보게 됩니다:\n\n- 긴 영상 대본 검수\n- 여러 자료 비교\n- 자막 오류 찾기\n- 업로드 체크리스트 확인\n\n에이전트는 전체 목표를 맡는 주체이고, 서브에이전트는 그중 일부 역할을 맡는 보조 주체입니다. Skill은 절차와 기준 묶음이고, 서브에이전트는 작업을 수행하는 역할 단위입니다. **지침과 역할은 서로 다르다는 점을 구분해 두면 좋습니다.**\n\n### 2.3 층위 3 · 컴퓨터에게 시키는 말\n\n이 층위의 단어들은 컴퓨터에게 직접 일을 시킬 때의 실행 환경, 명령 문장, 실행 파일을 설명합니다. AI가 권한을 부여받은 경우, 이 층위의 명령을 대신 입력하거나 실행할 수 있습니다.\n\n### 터미널, Terminal\n\n터미널은 명령어를 입력하고 결과를 보는 창입니다. **컴퓨터와 글자로 대화하는 창**이라고 생각하면 됩니다.\n\n다만 터미널 자체가 명령을 이해하는 주체는 아닙니다. 터미널 안에서 bash, zsh, PowerShell 같은 Shell이 명령을 해석합니다. 그래서 터미널은 장소이고, Shell은 그 안에서 명령을 읽고 처리하는 프로그램에 가깝습니다.\n\n터미널은 이런 안내에서 자주 등장합니다:\n\n- 로컬 AI 도구 설치\n- 영상 처리 도구 실행\n- 스크립트 실행\n- 개발 서버 실행\n\n터미널, Shell, command, CLI는 자주 함께 나오지만 역할이 다릅니다. **터미널은 창, Shell은 명령 해석기, command는 실제 입력 문장, CLI는 글자로 프로그램을 조작하는 방식**입니다.\n\n### Shell\n\nShell은 터미널에 입력한 명령을 해석해 운영체제에 전달하는 프로그램입니다. **사람이 입력한 명령을 컴퓨터가 실행할 수 있게 통역하는 통역사**라고 볼 수 있습니다.\n\nShell은 사용자가 입력한 명령을 읽고, 어떤 프로그램을 실행할지 판단합니다. bash, zsh, PowerShell 등이 Shell에 해당합니다. 파일 경로, 환경 변수, 명령 연결 같은 규칙도 Shell이 처리합니다.\n\n이 단어는 이런 표현에서 보게 됩니다:\n\n- “shell command”\n- “bash에서 실행”\n- “zsh 설정”\n- “PowerShell 명령”\n\nShell은 명령 해석기이고, bash는 Shell의 한 종류입니다. 터미널은 Shell을 보여주는 창입니다. **터미널과 Shell을 구분하면 설치 문서나 오류 메시지를 읽을 때 덜 헷갈립니다.**\n\n### bash\n\nbash는 Linux와 macOS 계열 환경에서 널리 쓰이는 Shell의 한 종류입니다. **컴퓨터에게 짧은 명령을 전달하는 대표적인 통역사 중 하나**라고 보면 됩니다.\n\n설치 문서나 자동화 안내에서 `bash install.sh` 같은 명령을 자주 볼 수 있습니다. Windows에서는 PowerShell, Git Bash, WSL 같은 환경에서 bash와 비슷한 명령을 접할 수 있습니다. bash는 웹사이트를 만드는 개발 언어라기보다, 컴퓨터 명령을 해석하고 실행하는 Shell입니다.\n\nbash는 이런 작업에서 자주 등장합니다:\n\n- `.sh` 파일 실행\n- 프로그램 설치\n- 폴더 이동\n- 파일 복사\n- 여러 명령 이어서 실행\n\nbash는 Shell입니다. Python은 프로그래밍 언어이고, Node는 JavaScript 실행 환경이며, PowerShell은 Windows에서 많이 쓰이는 다른 종류의 Shell입니다. **bash를 개발 언어로 보기보다 명령 해석기로 이해하면 흐름이 명확해집니다.**\n\n### command\n\ncommand는 터미널에 입력하는 실제 명령 문장입니다. **컴퓨터에게 보내는 한 줄짜리 작업 지시문**이라고 볼 수 있습니다.\n\ncommand는 보통 프로그램 이름, 옵션, 대상 파일로 구성됩니다. 예를 들어 `node script.mjs input.mp4`에는 무엇을 실행할지와 어떤 파일을 대상으로 할지가 함께 들어갑니다. 하나의 command를 직접 입력할 수도 있고, 여러 command를 스크립트 파일에 모아 둘 수도 있습니다.\n\n이 단어는 AI가 “다음 명령을 실행하면 됩니다”라고 안내할 때 자주 보입니다. 또는 로컬 AI가 권한을 부여받아 터미널 명령을 실행할 때도 command를 만나게 됩니다.\n\ncommand는 실제 입력 문장이고, CLI는 글자로 조작하는 방식입니다. 터미널은 command를 입력하는 창이고, 스크립트는 command나 코드를 모아 둔 파일입니다. **한 줄 명령인지, 명령을 담은 파일인지 구분하는 것이 중요합니다.**\n\n### 스크립트, script\n\n스크립트는 컴퓨터가 순서대로 실행하도록 적어 둔 명령 묶음 파일입니다. **매번 직접 입력하기 귀찮은 여러 명령을 순서대로 적어 둔 자동 실행 목록**에 가깝습니다.\n\n스크립트는 반복 작업을 자동화할 때 자주 쓰입니다. `.sh`는 Shell 스크립트, `.mjs`는 Node에서 실행하는 JavaScript 계열 스크립트, `.py`는 Python 스크립트인 경우가 많습니다. 스크립트가 실제로 파일을 바꾸거나 외부 서비스에 접속하는지는 실행 권한과 내용에 따라 달라집니다.\n\n영상 작업에서는 이런 자동화에 쓰일 수 있습니다:\n\n- 영상 파일 일괄 이름 변경\n- 자막 파일 정리\n- 썸네일 이미지 크기 변환\n- 업로드용 설명문 생성\n\ncommand는 한 줄 명령이고, 스크립트는 여러 명령이나 코드를 파일로 묶은 것입니다. Markdown 문서는 설명서에 가깝고, 일반적으로 실행 파일이 아닙니다. **문서 파일과 실행 파일을 구분해 두면 권한을 판단할 때도 도움이 됩니다.**\n\n### 전역, global\n\n전역(global)은 특정 폴더 하나가 아니라 컴퓨터 전체나 사용자 계정 전체에 적용된다는 뜻입니다. **한 작업방에만 붙인 규칙이 아니라, 사무실 전체에 붙인 공지문**에 가깝습니다.\n\n프로그램을 전역으로 설치하면 여러 폴더에서 같은 명령을 사용할 수 있습니다. 설정을 전역으로 바꾸면 특정 프로젝트뿐 아니라 다른 작업에도 영향을 줄 수 있습니다. 편리하지만, 프로젝트마다 다른 버전이나 다른 설정이 필요할 때는 헷갈릴 수 있습니다.\n\n이런 표현에서 전역을 보게 됩니다:\n\n- `npm install -g ...`\n- “global settings”\n- “global config”\n- “전역 지시문”\n\n전역(global)은 전체에 적용되고, 로컬(local)은 현재 폴더나 현재 프로젝트에만 적용됩니다. **전역 설치는 편하지만, 여러 프로젝트를 다룰 때 버전 충돌이 생길 수 있습니다.**\n\n### node\n\nNode.js는 JavaScript를 브라우저 밖, 즉 내 컴퓨터에서 실행할 수 있게 해주는 실행 환경입니다. **웹에서 쓰던 JavaScript를 내 컴퓨터에서도 일하게 해주는 실행 엔진**이라고 생각하면 됩니다.\n\nJavaScript는 원래 웹브라우저에서 많이 쓰이는 언어지만, Node.js를 사용하면 컴퓨터에서 직접 JavaScript 파일을 실행할 수 있습니다. 많은 AI 도구, MCP 서버, 자동화 스크립트가 Node.js 기반으로 제공되기도 합니다. 그래서 `node`, `npm`, `npx` 같은 명령을 함께 보게 되는 경우가 많습니다.\n\nNode.js는 이런 명령에서 자주 등장합니다:\n\n- `node server.mjs`\n- `npm install`\n- `npx ...`\n- 로컬 MCP 서버 실행\n- 웹앱 개발 서버 실행\n- 자동화 스크립트 실행\n\nJavaScript는 언어이고, Node.js는 JavaScript를 실행하는 환경입니다. npm은 Node.js 생태계의 패키지 설치 도구이고, Next.js는 웹사이트·웹앱을 만들기 위한 프레임워크입니다. **언어, 실행 환경, 설치 도구, 프레임워크를 나눠 보면 훨씬 덜 헷갈립니다.**\n\n### 2.4 층위 4 · 개발 언어 (이름만 알면 되는 것)\n\n이 층위의 단어들은 AI가 결과물을 만들 때 사용하는 개발 기술의 이름입니다. 비개발자는 문법을 외우기보다, **AI가 어떤 재료로 어떤 종류의 결과물을 만들고 있는지 알아보는 정도**면 충분합니다.\n\n### Python\n\nPython은 자동화, 데이터 처리, 파일 정리, AI 관련 작업에 널리 쓰이는 프로그래밍 언어입니다. **반복 업무를 시키기 좋은 만능 사무 도구 같은 언어**라고 볼 수 있습니다.\n\nPython은 비교적 읽기 쉬운 문법 때문에 자동화 작업에서 자주 선택됩니다. AI가 `.py` 파일을 만들어 영상 파일 목록을 정리하거나, 자막 텍스트를 가공하거나, CSV 데이터를 분석할 수 있습니다. 직접 코딩하지 않더라도 “이 결과물은 Python 스크립트구나” 정도를 알면 흐름을 이해하기 쉽습니다.\n\n크리에이터 작업에서는 이런 곳에서 보게 됩니다:\n\n- 자막 정리\n- 파일명 일괄 변경\n- 조회수 데이터 분석\n- 대본 텍스트 가공\n- 이미지·영상 처리 자동화\n\nPython은 언어입니다. 스크립트는 Python 같은 언어로 적은 실행 파일일 수 있습니다. Node.js는 JavaScript를 실행하는 환경입니다. **Python과 Node.js를 같은 종류로 보기보다, 언어와 실행 환경을 구분해 두는 편이 좋습니다.**\n\n### JavaScript / TypeScript\n\nJavaScript는 웹에서 많이 쓰이는 프로그래밍 언어이고, TypeScript는 JavaScript에 타입 규칙을 더한 언어입니다. **JavaScript가 기본 작업 언어라면, TypeScript는 맞춤법 검사와 안전장치를 더한 버전**이라고 볼 수 있습니다.\n\nJavaScript는 웹페이지의 동작, 웹앱, Node.js 자동화에 널리 쓰입니다. TypeScript는 큰 프로젝트에서 실수를 줄이기 위해 변수와 데이터 형태를 더 엄격하게 확인하도록 만든 JavaScript 확장에 가깝습니다. AI가 `.js`, `.mjs`, `.ts`, `.tsx` 파일을 만들거나 수정할 때 이 이름들을 보게 됩니다.\n\n이 기술들은 이런 결과물에 자주 쓰입니다:\n\n- 웹사이트\n- 채널 운영 대시보드\n- 업로드 관리 도구\n- MCP 서버\n- Node.js 자동화 스크립트\n\nJavaScript와 Java는 이름이 비슷하지만 다른 언어입니다. TypeScript는 실행될 때 보통 JavaScript로 변환됩니다. Node.js는 JavaScript를 내 컴퓨터에서 실행하게 해주는 환경입니다. **JavaScript, TypeScript, Node.js를 한 덩어리로 보되 각자의 역할은 나눠서 이해하면 좋습니다.**\n\n### React\n\nReact는 웹 화면을 작은 부품 단위로 만들기 위한 JavaScript 라이브러리입니다. **웹 화면을 레고 블록처럼 나누어 만드는 도구**라고 생각하면 됩니다.\n\nReact는 버튼, 메뉴, 카드, 목록 같은 화면 요소를 부품처럼 만들어 조립하는 방식으로 웹앱을 구성합니다. AI가 “React component”라는 말을 쓰면 웹 화면의 한 조각을 뜻하는 경우가 많습니다. Next.js는 React를 기반으로 웹사이트와 웹앱을 더 체계적으로 만들게 해주는 도구입니다.\n\nReact는 이런 화면을 만들 때 자주 보게 됩니다:\n\n- 채널 포트폴리오 사이트\n- 콘텐츠 캘린더 웹앱\n- 내부 관리 페이지\n- 랜딩페이지 UI\n\nReact는 화면 부품을 만드는 라이브러리입니다. Next.js는 React를 바탕으로 웹사이트·웹앱 전체 구조를 만드는 프레임워크입니다. HTML/CSS는 웹페이지의 구조와 모양을 담당합니다. **React는 ‘화면 조각을 만드는 도구’로 이해하면 충분합니다.**\n\n### Next.js\n\nNext.js는 웹사이트나 웹앱을 만들기 위한 React 기반 프레임워크입니다. 프레임워크는 앱을 정해진 구조로 만들게 도와주는 틀입니다. **웹사이트를 처음부터 맨손으로 짓는 대신, 방 배치와 기본 골격이 잡힌 건축 키트를 쓰는 것**과 비슷합니다.\n\nNext.js는 페이지 구성, 라우팅, 서버 기능, 배포 구조 등을 함께 다루는 웹 개발 도구입니다. 엄밀히 말하면 개발 언어는 아니지만, 비개발자는 “AI가 웹앱을 만들 때 자주 쓰는 기술 이름”으로 이해하면 충분합니다.\n\nAI가 이런 결과물을 만들 때 Next.js를 볼 수 있습니다:\n\n- 채널 소개 사이트\n- 강의 판매 페이지\n- 콘텐츠 관리 대시보드\n- 영상 아이디어 보드\n\nNext.js는 프레임워크이고, React는 화면 부품을 만드는 라이브러리입니다. JavaScript/TypeScript는 Next.js 프로젝트에서 주로 쓰는 언어이고, Node.js는 개발 중 Next.js를 실행하는 환경으로 자주 쓰입니다. **Next.js를 언어가 아니라 웹앱을 짜는 큰 틀로 이해하면 됩니다.**\n\n### HTML / CSS\n\nHTML은 웹페이지의 구조를 만들고, CSS는 웹페이지의 모양을 꾸미는 기술입니다. **HTML이 집의 구조와 가구 배치라면, CSS는 벽지, 조명, 색감, 인테리어**입니다.\n\nHTML은 제목, 문단, 이미지, 버튼 같은 웹페이지의 뼈대를 정합니다. CSS는 색상, 글꼴, 여백, 배치 같은 시각적 스타일을 정합니다. 엄밀히 말하면 Python 같은 프로그래밍 언어와는 다르지만, 웹 결과물을 이해할 때 가장 기본적으로 보게 되는 개발 기술 이름입니다.\n\nHTML과 CSS는 이런 결과물을 만들 때 자주 등장합니다:\n\n- 랜딩페이지\n- 포트폴리오 페이지\n- 영상 설명용 웹페이지\n- 자막 미리보기 화면\n- 뉴스레터 템플릿\n\nHTML은 구조이고, CSS는 스타일입니다. JavaScript는 동작을 담당합니다. Next.js 같은 프레임워크는 이 기술들을 묶어 더 큰 웹앱을 만들게 해줍니다. **웹 결과물을 볼 때는 구조, 스타일, 동작을 나누어 보면 이해가 쉬워집니다.**\n\n## 참고\n\n본문에서 언급한 공식 문서와 확인이 필요한 항목은 아래에서 볼 수 있습니다:\n\n- MDN API 설명: <https://developer.mozilla.org/en-US/docs/Glossary/API> (2026-05 기준, 공식 문서 확인 필요)\n- MCP 공식 문서: <https://modelcontextprotocol.io/introduction> (2026-05 기준, 공식 문서 확인 필요)\n- CommonMark Markdown 규격: <https://spec.commonmark.org/> (2026-05 기준, 공식 문서 확인 필요)\n- Skill, Instructions, Playbook 등 이름과 작동 방식은 도구마다 다를 수 있습니다. 사용 중인 AI 도구의 공식 문서 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- 토큰 계산 방식과 한도는 모델마다 다릅니다. 사용하는 모델의 공식 문서 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- GNU Bash 매뉴얼: <https://www.gnu.org/software/bash/manual/bash.html> (2026-05 기준, 공식 문서 확인 필요)\n- Node.js 공식 문서: <https://nodejs.org/en/learn/getting-started/introduction-to-nodejs> (2026-05 기준, 공식 문서 확인 필요)\n- Python 공식 문서: <https://docs.python.org/3/tutorial/> (2026-05 기준, 공식 문서 확인 필요)\n- MDN JavaScript 문서: <https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide> (2026-05 기준, 공식 문서 확인 필요)\n- TypeScript 공식 문서: <https://www.typescriptlang.org/docs/> (2026-05 기준, 공식 문서 확인 필요)\n- React 공식 문서: <https://react.dev/learn> (2026-05 기준, 공식 문서 확인 필요)\n- Next.js 공식 문서: <https://nextjs.org/docs> (2026-05 기준, 공식 문서 확인 필요)\n- MDN HTML 문서: <https://developer.mozilla.org/en-US/docs/Web/HTML> (2026-05 기준, 공식 문서 확인 필요)\n- MDN CSS 문서: <https://developer.mozilla.org/en-US/docs/Web/CSS> (2026-05 기준, 공식 문서 확인 필요)\n\n---\n"},{"id":"ch3","num":"3","title":"AI로 다른 결과를 내는 핵심 — 도구 활용","raw":"## 3. AI로 다른 결과를 내는 핵심 — 도구 활용\n\n챗봇만 사용할 때 AI는 주로 “말로 답하는 도구”에 가깝습니다. 하지만 로컬 AI에 도구를 연결하면, 권한을 부여받은 범위 안에서 자료를 찾고, 파일을 만들고, 브라우저를 조작하고, 결과물을 정리하는 일까지 이어서 처리할 수 있습니다. **차이는 AI가 말을 얼마나 잘하느냐보다, 어떤 도구를 안전하게 쓸 수 있느냐에서 크게 납니다.**\n\n영상 크리에이터에게 중요한 것은 도구 이름을 많이 외우는 일이 아닙니다. 각 도구가 어느 부류에 속하는지 이해하면, 작업 흐름을 훨씬 쉽게 설계할 수 있습니다:\n\n- 자료 수집·웹 자동화 도구\n- 이미지·영상 생성 모델과 서비스\n- 음성·음악 도구\n- 영상 후반·조립 도구\n- 문서·디자인·협업 도구\n- 결과물 확인·관리 도구\n\n로컬 AI라고 해서 모든 작업이 반드시 내 컴퓨터 안에서만 끝나는 것은 아닙니다. Replicate, CometAPI, Midjourney, Suno 같은 외부 서비스나 API를 쓰면 프롬프트, 이미지, 영상, 음성 자료가 해당 서비스로 전송될 수 있습니다. **외부 도구를 연결할 때는 2026-05 기준 공식 문서와 약관 확인이 필요합니다.**\n\n### 3.1 자료 수집·웹 자동화\n\n자료 수집·웹 자동화 도구는 인터넷에서 자료를 가져오거나, 웹페이지를 열고, 반복적인 클릭·스크롤·요청 작업을 대신하게 하는 부류입니다. 로컬 AI가 권한을 부여받은 경우, 레퍼런스 수집, 자막 확보, 링크 정리, 메타데이터 확인 같은 일을 자동화할 수 있습니다.\n\n### yt-dlp\n\nyt-dlp는 영상·자막 등을 내려받는 명령 도구(CLI: 글자로 명령을 입력해 실행하는 방식)입니다. 여러 영상 사이트에서 영상, 오디오, 자막, 메타데이터를 내려받는 데 쓰이며, 로컬 AI가 이 명령을 실행할 권한을 부여받은 경우 채널 백업, 자막 추출, 자료 정리 흐름에 포함될 수 있습니다. **강력한 다운로드 기능은 권리와 허용 범위가 분명할 때만 안전하게 쓸 수 있습니다.**\n\n쉽게 비유하면, 합법적으로 받을 수 있는 영상 자료를 대신 받아 주는 “다운로드 전문 직원”에 가깝습니다. 다만 아무 자료나 마음대로 가져와도 된다는 뜻은 아닙니다. 본인이 권리를 가진 자료이거나 사용이 허용된 자료에서만 사용해야 하며, 사이트 약관과 저작권을 함께 확인해야 합니다.\n\n영상 크리에이터는 본인 채널 영상 백업, 허가받은 자료의 자막 추출, 강의·인터뷰 영상의 스크립트 정리, 레퍼런스 영상 목록 관리에서 yt-dlp를 접하게 됩니다. yt-dlp가 “영상 사이트에서 자료를 찾아 내려받는 도구”라면, ffmpeg는 내려받은 영상·오디오를 자르거나 변환하는 “후반 처리 도구”입니다. Playwright는 웹페이지를 사람이 보는 것처럼 조작하는 도구라서 역할이 다릅니다.\n\n### Playwright\n\nPlaywright는 브라우저를 자동으로 조작해 클릭, 입력, 스크롤, 페이지 이동을 코드로 대신하게 하는 도구입니다. 사람이 웹브라우저에서 하는 행동을 코드로 재현하고, 페이지가 불러오는 네트워크 요청도 관찰할 수 있습니다. **웹사이트를 실제 브라우저 화면 기준으로 다뤄야 할 때 유용합니다.**\n\n권한이 있거나 허용된 범위에서는 영상 사이트의 목록을 정리하거나, 페이지 안에서 실제로 불러오는 영상 URL 후보를 탐지하는 데 쓰일 수 있습니다. 마우스와 키보드를 대신 움직여 주는 “웹브라우저 조작 로봇 손”이라고 보면 이해하기 쉽습니다.\n\n영상 플랫폼의 업로드 상태 확인, 레퍼런스 목록 수집, 썸네일 후보 페이지 정리, 반복적인 웹서비스 조작 자동화에서 자주 등장합니다. curl이 브라우저를 보지 않고 서버에 직접 요청을 보내는 도구라면, Playwright는 실제 브라우저를 띄워 자바스크립트가 실행된 화면까지 다룰 수 있습니다. API가 정해진 통로로 데이터를 주고받는 방식이라면, Playwright는 사람이 웹사이트를 쓰는 행동을 자동화하는 방식입니다.\n\n### curl\n\ncurl은 인터넷 주소로 데이터를 요청하거나 보내는 기본 명령 도구입니다. API(Application Programming Interface: 프로그램끼리 정해진 형식으로 요청·응답하는 통로)를 호출할 때 자주 쓰이며, 브라우저를 열지 않고도 특정 주소에 요청을 보내고 응답을 확인하거나 파일을 내려받을 수 있습니다. **서버에 직접 “요청 편지”를 보내는 도구라고 생각하면 쉽습니다.**\n\nReplicate, CometAPI, Notion 같은 서비스의 API가 잘 작동하는지 확인할 때도 curl이 자주 등장합니다. AI 모델 API 호출 테스트, 이미지 생성 요청, Notion 데이터베이스 업데이트, 파일 업로드·다운로드, 자동화 스크립트 점검에 쓰입니다.\n\ncurl을 사용할 때 등장하는 인증 토큰 또는 API 키는 비밀번호처럼 권한을 증명하는 값입니다. 이는 AI 토큰, 즉 모델이 글자를 처리할 때 계산하는 단위와는 다릅니다. 또한 curl은 브라우저 자동화 도구가 아니므로, 클릭이나 스크롤이 필요한 작업에는 Playwright가 더 적합합니다.\n\n### 3.2 이미지·영상 생성 (생성 AI)\n\n이미지·영상 생성 도구는 프롬프트, 참고 이미지, 설정값을 바탕으로 새로운 시각 결과물을 만드는 부류입니다. 이 영역에서는 “모델”, “서비스”, “플랫폼”, “MCP 연결 방식”이 서로 다른 층위라는 점을 먼저 이해하는 것이 좋습니다. **같은 생성 AI처럼 보여도, 실제로 결과물을 만드는 주체와 그 주체를 호출하는 통로는 다를 수 있습니다.**\n\n![생성 AI로 만든 광고 영상 키 이미지 예시](이미지/실제작업/cut_1-1.png)\n![생성 AI로 만든 광고 영상 키 이미지 예시](이미지/실제작업/cut_2-1.png)\n*실제 작업에서 생성한 컷 이미지 예시입니다. 같은 캐릭터·톤을 유지하며 여러 장면을 만들 수 있습니다.*\n\n### Higgsfield(MCP)\n\nHiggsfield는 이미지나 영상을 생성하는 서비스입니다. 반면 MCP(Model Context Protocol: AI 앱이 외부 도구와 자료에 연결되는 약속)는 생성 모델이 아니라, AI 앱과 외부 서비스 사이를 이어 주는 연결 방식입니다. **Higgsfield가 영상을 만들어 주는 공장이라면, MCP는 그 공장에 주문서를 전달하는 연결 통로에 가깝습니다.**\n\nHiggsfield가 MCP로 연동되는지, 공식 지원인지, 커뮤니티 서버인지, 어떤 기능을 호출할 수 있는지는 2026-05 기준 공식 문서 확인이 필요합니다. MCP 연동이라는 말이 보이더라도 그것이 곧 Higgsfield 자체를 뜻하는 것은 아닙니다.\n\n영상 작업에서는 쇼츠용 B-roll 생성, 움직이는 장면 후보 제작, 콘셉트 영상 테스트, 이미지에서 짧은 영상으로 확장하는 작업에서 접할 수 있습니다. 생성은 Higgsfield 서비스가 하고, MCP는 AI 앱이 그 서비스를 부를 수 있게 하는 연결 방식입니다. Replicate나 CometAPI처럼 여러 모델을 호출하는 플랫폼·게이트웨이와도 층위가 다릅니다.\n\n### Seedance\n\nSeedance는 텍스트나 참고 이미지를 바탕으로 영상을 생성하는 영상 생성 모델 계열입니다. 특정 영상 생성 모델 또는 모델 계열 이름으로 접하게 될 수 있으며, 생성 가능한 영상 길이, 해상도, 입력 방식, 제공 플랫폼, API 지원 여부는 제공 경로에 따라 달라질 수 있습니다. **영상 편집기라기보다는 새로운 영상 컷을 만들어 내는 생성 모델로 이해하는 편이 좋습니다.**\n\n대본 속 한 장면을 짧은 움직이는 컷으로 뽑아 주는 “영상 생성 담당자”에 가깝습니다. 쇼츠의 삽입 컷, 배경 움직임, 광고 영상의 콘셉트 장면, 실제 촬영 전 시각화용 영상 후보를 만들 때 쓰일 수 있습니다.\n\nSeedance는 모델 계열이고, Replicate나 CometAPI는 모델을 호출하게 해주는 플랫폼 또는 게이트웨이입니다. ffmpeg나 Remotion은 생성된 영상을 자르거나 조립하는 후반 도구이므로, Seedance와 역할이 다릅니다.\n\n### GPT-Image-2\n\nGPT-Image-2는 텍스트나 참고 이미지를 바탕으로 이미지를 생성·편집하는 GPT 계열 이미지 생성 모델명으로 접할 수 있는 항목입니다. 실제 공식 모델명, 버전, 제공 방식, 가격, 입력 가능한 이미지 조건은 변동될 수 있으므로 2026-05 기준 공식 문서 확인이 필요합니다. **이름이 모델을 가리키더라도, 실제 사용 조건은 제공 방식에 따라 달라질 수 있습니다.**\n\n보통 이런 이미지 모델은 API나 통합 서비스, 또는 AI 앱의 도구 연결을 통해 호출됩니다. 글로 설명한 썸네일 시안이나 장면 이미지를 그려 주는 “이미지 제작 담당자”처럼 생각하면 쉽습니다.\n\n유튜브 썸네일 시안, 스토리보드, 장면 콘셉트 아트, 제품 이미지 변형, 배경 이미지 제작에 쓰일 수 있습니다. GPT-Image-2는 모델명이고, ChatGPT 같은 앱은 모델을 사용하는 제품 인터페이스입니다. CometAPI 같은 통합 API를 통해 호출하는 경우에도, CometAPI는 모델 자체가 아니라 연결 창구입니다.\n\n### Midjourney(MJ)\n\nMidjourney(MJ)는 프롬프트를 바탕으로 이미지를 생성하는 이미지 생성 모델·서비스 계열입니다. 강한 스타일감과 시각적 완성도로 많이 알려져 있으며, 분위기, 색감, 구도, 스타일을 말로 설명하면 시각 시안을 만들어 주는 “AI 미술 감독”에 가깝습니다. **시각적 콘셉트와 무드보드를 빠르게 잡을 때 자주 언급되는 도구입니다.**\n\n접근 방식은 웹, 앱, 커뮤니티 기반 인터페이스, API 또는 외부 통합 방식 등으로 바뀔 수 있습니다. 자동화 사용, 상업적 이용, 이미지 권리 조건도 요금제와 정책에 따라 달라질 수 있으므로 2026-05 기준 공식 문서 확인이 필요합니다.\n\n영상 크리에이터는 썸네일 배경, 인물·캐릭터 콘셉트, 채널 브랜딩 이미지, 포스터형 이미지, 영상 분위기 참고용 무드보드 제작에서 Midjourney를 접할 수 있습니다. Midjourney는 이미지 생성 모델·서비스이고, CometAPI는 여러 모델을 한 형식으로 호출하게 해주는 게이트웨이입니다. MJ를 어떤 게이트웨이를 통해 쓰더라도, 원 서비스의 정책과 게이트웨이의 정책은 따로 확인해야 합니다.\n\n### nano-banana\n\nnano-banana는 이미지 생성 모델 또는 별칭으로 접할 수 있는 이름이며, 정확한 공식 명칭과 제공 경로 확인이 필요한 항목입니다. 모델 목록이나 통합 서비스에서 이미지 생성 모델 이름처럼 등장할 수 있지만, 공식 모델명인지, 별칭인지, 특정 제공사의 내부 이름인지, 게이트웨이에서 붙인 표시명인지는 확인이 필요합니다. **이름만 보고 같은 모델이라고 단정하기 어렵습니다.**\n\n같은 이름처럼 보여도 실제 성능, 입력 방식, 가격, 권한 정책이 제공처마다 다를 수 있습니다. 메뉴판에 적힌 이미지 모델 이름은 맞지만, 어느 주방에서 어떤 방식으로 나오는 메뉴인지 확인해야 하는 항목이라고 보면 됩니다.\n\n썸네일 변형, 참고 이미지 기반 재구성, 캐릭터 이미지 테스트, 콘셉트 이미지 생성 등에서 모델 선택지로 볼 수 있습니다. GPT-Image 계열, Midjourney, 다른 이미지 모델과 비교할 때는 이름만 보지 말고 제공사, 입력 방식, 사용권, 결과물 권리를 함께 확인해야 합니다.\n\n### Replicate\n\nReplicate는 여러 AI 모델을 한곳에서 API로 호출할 수 있게 해주는 모델 실행 플랫폼입니다. 이미지, 영상, 음성, 업스케일, 분류 등 다양한 AI 모델을 API로 실행할 수 있게 해주며, 모델 자체라기보다는 여러 모델을 올려 두고 실행할 수 있는 공간에 가깝습니다. **여러 AI 도구가 입점해 있는 공용 작업장이라고 생각하면 이해하기 쉽습니다.**\n\n필요한 모델을 골라 작업을 맡기는 방식이며, 모델별 버전, 속도, 비용, 라이선스는 각각 다를 수 있습니다. 그래서 Replicate를 쓴다고 해서 모든 모델의 조건이 같아지는 것은 아닙니다.\n\n이미지 생성, 영상 생성, 이미지 확대, 배경 제거, 음성 처리, 실험용 모델 비교, 자동화 파이프라인 제작에 쓰입니다. Replicate가 플랫폼 안에서 제공되는 모델을 실행하는 구조라면, CometAPI는 여러 외부 모델·서비스를 하나의 API로 묶는 게이트웨이에 가깝습니다.\n\n### CometAPI\n\nCometAPI는 여러 생성 모델과 서비스를 하나의 API 형식으로 호출하게 해주는 통합 게이트웨이입니다. Midjourney, Suno, GPT-Image 계열 등 여러 모델을 하나의 API 방식으로 호출하도록 지원하는 게이트웨이로 소개되는 경우가 있습니다. **CometAPI 자체가 생성 모델은 아니며, 여러 모델로 요청을 보내는 연결 창구에 가깝습니다.**\n\n어떤 모델을 실제로 지원하는지, 원 서비스와 기능 차이가 있는지, 가격과 속도, 권리 조건이 어떻게 다른지는 2026-05 기준 공식 문서 확인이 필요합니다. 여러 식당에 각각 전화하지 않고, 한 배달 창구에 주문을 넣는 방식으로 비유할 수 있습니다.\n\n로컬 AI가 썸네일은 이미지 모델로, BGM은 음악 모델로, 영상 컷은 영상 모델로 나누어 호출하는 자동화 흐름에서 쓰일 수 있습니다. CometAPI는 게이트웨이이고, API는 프로그램끼리 요청을 주고받는 통로이며, MCP는 AI 앱이 도구를 사용할 수 있게 연결하는 약속입니다. CometAPI를 MCP 서버가 감싸서 제공할 수는 있지만, API와 MCP는 같은 개념이 아닙니다.\n\n### 3.3 음성·음악\n\n음성·음악 도구는 대본을 목소리로 바꾸거나, 분위기에 맞는 음악을 생성하는 부류입니다. 영상 크리에이터에게는 품질만큼이나 목소리 권리, 상업적 이용 조건, 플랫폼 업로드 정책 확인이 중요합니다.\n\n### ElevenLabs(TTS)\n\nElevenLabs는 텍스트를 사람 목소리 같은 음성으로 바꾸는 TTS(Text-to-Speech: 글자를 음성으로 읽어 주는 기술) 서비스입니다. 내레이션, 더빙, 캐릭터 음성, 임시 가이드 보이스를 만드는 데 쓰이며, API를 통해 자동으로 음성 파일을 생성하는 흐름에도 연결될 수 있습니다. **대본을 넣으면 읽어 주는 AI 성우실에 가깝습니다.**\n\n음성 복제나 특정 화자 스타일 사용 기능은 제공 여부와 정책이 달라질 수 있습니다. 타인의 목소리를 사용할 때는 동의와 권리 확인이 필요합니다.\n\n쇼츠 내레이션, 정보성 영상 더빙, 다국어 음성 버전 제작, 편집 전 임시 목소리 제작, 자동 콘텐츠 제작 파이프라인에서 사용됩니다. TTS가 글자를 음성으로 바꾸는 기술이라면, STT(Speech-to-Text: 음성을 글자로 바꾸는 기술)는 반대 방향입니다. Suno처럼 음악을 만드는 서비스와도 역할이 다릅니다.\n\n### Suno\n\nSuno는 설명이나 가사를 바탕으로 음악·노래·BGM을 생성하는 AI 음악 서비스입니다. 원하는 분위기, 장르, 가사, 길이 등을 바탕으로 음악을 만들 수 있는 서비스로 알려져 있습니다. **“밝고 빠른 여행 브이로그용 음악”처럼 설명하면 음악 시안을 만들어 주는 AI 작곡가라고 볼 수 있습니다.**\n\n생성 가능한 형식, API 제공 여부, 상업적 이용 조건, 저작권 관련 정책은 변동될 수 있습니다. 유튜브나 광고 영상에 사용할 경우, 업로드 플랫폼의 음악 정책과 Suno의 이용 약관을 함께 확인하는 편이 안전합니다.\n\n오프닝 음악, 엔딩 음악, 배경음악(BGM: 영상 뒤에 깔리는 음악), 쇼츠용 짧은 사운드, 광고 영상의 분위기 시안 제작에 쓰입니다. Suno는 음악 생성 서비스이고, ElevenLabs는 말소리 생성 서비스입니다. 스톡 음악은 이미 만들어진 곡을 라이선스로 구매·사용하는 방식이고, Suno는 새 음악을 생성하는 방식이며, 둘 다 권리 조건 확인이 필요합니다.\n\n### 3.4 영상 후반·조립\n\n영상 후반·조립 도구는 이미 만들어진 영상, 이미지, 음성, 음악을 자르고 붙이고 변환하고 렌더링하는 부류입니다. 생성 AI가 재료를 만든다면, 이 부류의 도구는 그 재료를 실제 영상 파일로 조립하는 역할을 합니다.\n\n### ffmpeg\n\nffmpeg는 영상·오디오를 자르고, 변환하고, 합치고, 프레임을 추출하는 핵심 명령 도구입니다. 영상 작업에서 가장 널리 쓰이는 기본 일꾼 중 하나이며, 영상 포맷 변환, 해상도 변경, 오디오 추출, 특정 구간 자르기, 여러 클립 합치기, 프레임 이미지 추출, 썸네일 만들기 등에 사용됩니다. **편집실 뒤편에서 파일을 실제로 자르고 포장하는 만능 공구함 같은 도구입니다.**\n\n로컬 AI가 명령 실행 권한을 부여받은 경우, 수십 개 파일을 반복 처리하는 자동화에 매우 유용합니다. 쇼츠 비율 변환, 자막용 오디오 추출, 생성 영상 길이 맞추기, 썸네일용 프레임 뽑기, 여러 클립 이어 붙이기, 업로드용 파일 변환에 쓰입니다.\n\nffmpeg는 파일 처리 도구이고, Premiere는 사람이 타임라인을 보며 편집하는 프로그램입니다. yt-dlp가 영상을 내려받는 데 강하다면, ffmpeg는 내려받은 파일을 가공하는 데 강합니다. 명령어 옵션은 강력하지만 복잡하므로, 원본 파일을 보존한 상태에서 작업하는 습관이 좋습니다.\n\n### Remotion\n\nRemotion은 React/JavaScript 코드로 영상을 만들고 렌더링하는 도구입니다. 자막, 이미지, 그래프, 텍스트 애니메이션, 반복 템플릿을 코드로 구성해 영상으로 출력할 수 있게 해줍니다. **정해진 영상 양식에 제목, 숫자, 이미지, 대본만 바꿔 넣어 여러 편을 찍어내는 자동 조립 라인에 가깝습니다.**\n\n코딩을 모르는 사람에게는 직접 다루기 어려울 수 있습니다. 다만 로컬 AI나 개발자가 템플릿을 만들어 두면 데이터만 바꿔 여러 영상을 자동 생성하기에 좋고, 특히 같은 형식의 쇼츠나 정보성 영상을 대량 제작할 때 유용합니다.\n\n뉴스 요약 쇼츠, 랭킹 영상, 상품 소개 영상, 자동 자막 영상, 매일 반복되는 데이터 기반 콘텐츠 제작에 쓰입니다. Remotion은 코드 기반 영상 제작 도구이고, Premiere는 타임라인 기반 편집 프로그램입니다. ffmpeg가 파일을 변환하고 합치는 낮은 층위의 도구라면, Remotion은 화면 구성과 애니메이션을 설계해 영상으로 렌더링하는 쪽에 가깝습니다.\n\n### Premiere MCP\n\nPremiere MCP는 Adobe Premiere Pro 같은 편집기를 MCP로 AI 앱에 연결해 편집 작업을 자동화하려는 방식입니다. 하나의 고정된 공식 기능명이라기보다, Premiere와 AI 앱 사이에 MCP 서버나 플러그인, 스크립트 연결을 두는 구성을 가리키는 경우가 많습니다. **Premiere에 AI가 사용할 수 있는 리모컨을 붙여, 가능한 편집 명령을 대신 실행하게 하는 방식입니다.**\n\n지원 여부, 구현 방식, 가능한 편집 명령은 사용 중인 MCP 서버와 Premiere의 확장 기능에 따라 달라집니다. 권한을 부여받은 경우 AI가 클립 불러오기, 파일 정리, 러프컷 배치 같은 작업을 도울 수 있지만, 어떤 기능이 가능한지는 확인이 필요합니다.\n\n러프컷 자동 배치, 클립 정리, 시퀀스 생성, 자막 파일 불러오기, 반복 편집 작업 보조 같은 흐름에서 접할 수 있습니다. Premiere는 편집 프로그램이고, MCP는 AI 앱과 외부 도구를 연결하는 방식입니다. Premiere 자체의 AI 기능, Adobe 플러그인, 커뮤니티 MCP 서버는 서로 다른 층위입니다.\n\n### 3.5 문서·디자인·협업 연동\n\n문서·디자인·협업 도구는 기획, 대본, 자료, 디자인 시안, 작업 상태를 정리하는 부류입니다. 로컬 AI가 API나 연동 권한을 부여받은 경우, 자료를 자동으로 기록하고 상태를 갱신하며 팀 작업 흐름을 정리할 수 있습니다.\n\n### Notion\n\nNotion은 문서, 데이터베이스, 일정, 작업 현황을 함께 관리하는 협업 도구입니다. 아이디어, 대본, 레퍼런스 링크, 업로드 일정, 작업 상태를 정리하는 데 많이 쓰입니다. **콘텐츠 팀의 공용 기획 노트이자 작업 현황판이라고 볼 수 있습니다.**\n\nAPI를 이용하면 권한이 있는 페이지나 데이터베이스에 새 항목을 만들거나 기존 정보를 수정할 수 있습니다. 로컬 AI가 연결되면 생성한 이미지 목록, 영상 상태, 자막 파일 위치 등을 자동으로 기록하는 흐름을 만들 수 있습니다.\n\n콘텐츠 아이디어 보관함, 대본 관리, 촬영 체크리스트, 편집 상태표, 업로드 캘린더, 협업 피드백 정리에 쓰입니다. Notion 앱, Notion API, Notion AI는 서로 다릅니다. Notion 앱은 사람이 쓰는 작업 공간이고, API는 외부 프로그램이 Notion에 접근하는 통로이며, Notion AI는 Notion 안에서 제공되는 AI 기능입니다.\n\n### Figma\n\nFigma는 디자인과 프로토타입을 만드는 협업 도구입니다. 썸네일 구성, 브랜드 가이드, 화면 디자인, 클릭되는 모형인 프로토타입을 만드는 데 쓰입니다. **디자이너가 화면 구성, 색상, 글꼴, 버튼 모양을 정리해 두는 디자인 작업대에 가깝습니다.**\n\n프로토타입은 사용자가 눌러 볼 수 있는 모형이지만, 실제 기능이 구현된 앱이나 웹사이트는 보통 아닙니다. API나 플러그인을 통해 디자인 파일 정보, 이미지, 컴포넌트 데이터를 가져오는 자동화도 가능합니다.\n\n유튜브 썸네일 템플릿, 채널 브랜딩, 영상 타이틀 카드, 웹페이지 시안, 앱 화면 목업, 디자인 시스템 관리에 쓰입니다. Figma는 디자인 설계와 협업에 강하고, Canva는 템플릿 기반으로 빠르게 완성 이미지를 만드는 데 강합니다. Figma의 프로토타입은 실제 기능이 있는 서비스가 아니라 클릭 흐름을 보여 주는 모형인 경우가 대부분입니다.\n\n### Canva\n\nCanva는 웹 기반 그래픽 디자인 도구로, 썸네일·카드뉴스·배너 등을 템플릿으로 쉽게 만드는 서비스입니다. 디자인 경험이 많지 않아도 템플릿을 활용해 빠르게 결과물을 만들 수 있고, 유튜브 썸네일, SNS 카드, 발표용 이미지, 간단한 영상 디자인까지 폭넓게 사용됩니다. **디자인 초보도 템플릿을 골라 빠르게 결과물을 만드는 온라인 디자인 편집실이라고 볼 수 있습니다.**\n\nAPI나 앱 연동 기능은 제공 범위가 달라질 수 있으므로, 자동화 목적이라면 2026-05 기준 공식 문서 확인이 필요합니다. 유튜브 썸네일, 쇼츠 커버, 인스타그램 카드뉴스, 광고 배너, 간단한 브랜딩 이미지 제작에 쓰입니다.\n\nCanva는 완성형 마케팅 이미지 제작에 강하고, Figma는 디자인 시스템과 프로토타입 설계에 강합니다. 이미지 생성 모델은 새 이미지를 만들어 내는 도구이고, Canva는 이미지를 배치하고 편집해 최종 디자인으로 만드는 플랫폼입니다.\n\n### 3.6 결과물 확인·관리 (직접 만드는 도구)\n\nAI로 이미지를 수십 장, 영상을 수십 개 만들면 “생성”보다 “고르고 관리하는 일”이 더 커집니다. 이 부류는 외부 서비스라기보다, 로컬 AI와 함께 직접 만들어 쓰는 검수 화면, 갤러리, 대시보드에 가깝습니다.\n\n### HTML 갤러리·대시보드\n\nHTML 갤러리·대시보드는 생성한 이미지·영상·메타데이터를 한 화면에 모아 비교하고 고르기 위해 직접 만드는 웹페이지 형태의 결과물입니다. HTML, CSS, JavaScript를 이용해 로컬 폴더의 이미지, 영상, 프롬프트, 점수, 파일명을 한 화면에 정리할 수 있습니다. **생성된 결과물을 검수하고 관리하기 위한 화면이지, 이미지를 생성하는 모델은 아닙니다.**\n\n로컬 AI가 권한을 부여받은 경우, 생성 결과물을 읽어 자동으로 갤러리 파일을 만들어 줄 수 있습니다. 수백 장의 후보 이미지를 책상 위에 흩어 놓는 대신, 브라우저 안에 정리해 둔 “검수판”이라고 생각하면 쉽습니다.\n\n썸네일 후보 비교, 생성 영상 베스트 컷 선정, 프롬프트별 결과 비교, 파일명·사용 여부·점수 기록, 최종 업로드 후보 정리에 쓰입니다. HTML 갤러리는 편집 도구가 아니라 확인·관리 도구입니다. 실제 자르기와 합치기는 ffmpeg, Premiere, Remotion 같은 도구가 담당합니다. 또한 로컬에서 보는 HTML 대시보드는 인터넷에 공개된 웹사이트와 다릅니다.\n\n### 로컬 HTTP 서버로 띄워 보기\n\n로컬 HTTP 서버는 내 컴퓨터의 폴더를 임시 웹서버로 열어 브라우저에서 결과물을 확인하는 방법입니다. 예를 들어 작업 폴더에서 `python -m http.server`를 실행하면 브라우저에서 `http://localhost:8000` 같은 주소로 HTML 갤러리나 결과물을 확인할 수 있습니다. **완성 전 사이트를 세상에 공개하는 것이 아니라, 내 작업실 안에서만 임시로 켜 보는 미리보기 창에 가깝습니다.**\n\n이 방식은 기본적으로 내 작업 환경에서 확인하기 위한 것이며, 인터넷에 공개 배포하는 것과는 다릅니다. 다만 네트워크 설정, 방화벽, 터널링 도구를 어떻게 쓰느냐에 따라 다른 기기에서 접근 가능해질 수도 있으므로 공개 범위를 확인해야 합니다.\n\nHTML 갤러리 확인, 영상·이미지 미리보기, Remotion 결과물 점검, 자바스크립트가 포함된 대시보드 확인, 생성 결과물 비교 화면을 브라우저에서 볼 때 사용합니다. `localhost`는 보통 내 컴퓨터에서 접속하는 주소입니다. 인터넷 공개 배포는 별도의 호스팅, 서버, 도메인, 보안 설정이 필요한 작업이며, 파일을 더블클릭해 여는 `file://` 방식과 HTTP 서버로 여는 방식은 브라우저 보안 정책 때문에 일부 기능 동작이 다를 수 있습니다.\n\n## 참고\n\n아래 문서는 실제 연결·요금·권한·사용 조건을 확인할 때 기준이 되는 출처입니다:\n\n- yt-dlp 공식 저장소: https://github.com/yt-dlp/yt-dlp — 지원 사이트, 옵션, 사이트별 동작은 자주 바뀔 수 있으므로 각 사이트 약관과 함께 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Playwright 공식 문서: https://playwright.dev/docs/intro — 로그인, 캡차, 유료 콘텐츠, 비공개 자료 접근은 사이트 정책과 권한 범위 확인이 필요합니다.\n- curl 공식 문서: https://curl.se/docs/ — API 키와 인증 토큰은 외부에 노출되지 않도록 관리해야 합니다.\n- Higgsfield 공식 사이트: https://higgsfield.ai/ — MCP 지원 여부·방식·요금·권한 정책은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- MCP 공식 문서: https://modelcontextprotocol.io/ — Higgsfield MCP, Premiere MCP처럼 AI 앱과 외부 도구를 연결하는 방식 확인에 참고합니다.\n- Seedance: 제공사 또는 사용 중인 플랫폼의 Seedance 모델 문서를 확인해야 합니다. 모델명, 제공 경로, 가격, 사용 가능 국가, 상업적 이용 조건은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- OpenAI 이미지 생성 문서: https://platform.openai.com/docs/guides/images — GPT-Image 계열의 실제 모델명·버전·가격·제공 여부는 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Midjourney 공식 문서: https://docs.midjourney.com/ — API 제공 여부, 자동화 허용 범위, 가격, 상업적 이용 조건은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- nano-banana: 사용 중인 플랫폼의 공식 모델 목록을 확인해야 합니다. 모델명·제공사·요금·권리 조건은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Replicate 공식 문서: https://replicate.com/docs — 모델별 라이선스, 가격, 입력 제한, 출력물 권리는 각 모델 문서를 확인해야 합니다. (2026-05 기준, 공식 문서 확인 필요)\n- CometAPI 공식 문서: https://docs.cometapi.com/ — 지원 모델, 가격, 원 서비스와의 기능 차이, 상업적 이용 조건은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- ElevenLabs 공식 문서: https://elevenlabs.io/docs — 음성 복제, 상업적 이용, 보이스 라이선스, API 가격은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Suno 공식 사이트: https://suno.com/ — 이용 약관, 상업적 이용, API 제공 여부, 저작권 정책은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- ffmpeg 공식 문서: https://ffmpeg.org/documentation.html — 명령어 옵션은 강력하지만 복잡하므로 원본 파일을 보존한 상태에서 작업하는 편이 좋습니다.\n- Remotion 공식 문서: https://www.remotion.dev/docs — React/JavaScript 기반이므로 템플릿 제작에는 개발 지식 또는 AI 보조가 필요할 수 있습니다.\n- Adobe Premiere Pro 개발 문서: https://developer.adobe.com/premiere-pro/ — Premiere MCP 지원 여부·방식·권한 범위는 사용 중인 MCP 서버 문서와 함께 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Notion API 공식 문서: https://developers.notion.com/ — 워크스페이스 권한, API 제한, 요금제별 기능은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Figma API 공식 문서: https://www.figma.com/developers/api — 파일 접근 권한, 플러그인 정책, API 제한은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- Canva 개발자 문서: https://www.canva.dev/docs/ — API, 앱, 템플릿 자동화, 상업적 이용 조건은 확인이 필요합니다. (2026-05 기준, 공식 문서 확인 필요)\n- MDN HTML 문서: https://developer.mozilla.org/en-US/docs/Web/HTML — 브라우저에서 로컬 파일을 직접 열 때와 로컬 HTTP 서버로 띄울 때는 동작 차이가 있을 수 있습니다.\n- Python http.server 문서: https://docs.python.org/3/library/http.server.html — 로컬 확인과 인터넷 공개는 다르며, 외부 공개가 필요한 경우 별도 배포 절차와 보안 설정 확인이 필요합니다.\n\n---\n"},{"id":"ch4","num":"4","title":"실제 작업 예시 — 우리가 한 것들","raw":"## 4. 실제 작업 예시 — 우리가 한 것들\n\n챗봇으로 AI를 쓸 때는 보통 질문을 던지고 답을 받는 방식이 중심입니다. 로컬 AI는 조금 다릅니다. **권한을 준 폴더와 도구 안에서 자료를 찾고, 분류하고, 만들고, 정리하는 여러 단계를 이어서 처리할 수 있습니다.**\n\n아래 예시는 “이런 일을 하고 싶었다 → 로컬 AI에게 이렇게 맡겼다 → 이런 결과가 나왔다”는 흐름으로 보면 됩니다.\n\n### 4.1 레퍼런스 영상 자동 수집·필터링\n\n광고 영상 사이트인 TVCF에서 해외 광고를 훑어보며, 영화처럼 조명과 구도가 살아 있는 ‘시네마틱한’ 레퍼런스만 모으고 싶었습니다. 문제는 후보가 수백 개였다는 점입니다. 사람이 하나씩 보기에는 시간이 너무 많이 들었고, 영상 주소도 페이지 안쪽에 숨어 있어 일반적인 저장 방식으로는 잘 잡히지 않았습니다.\n\n그래서 권한을 준 범위 안에서 로컬 AI에게 브라우저를 열고 페이지를 살펴보게 했습니다. 이후 실제 영상 주소를 찾아 영상을 받도록 맡겼습니다. 받은 영상은 앞부분을 1초 간격의 이미지로 뽑고, 그 이미지들을 기준으로 AI가 “시네마틱한가”를 1차, 2차로 나누어 걸렀습니다.\n\n![수집한 영상에서 1초 간격으로 뽑은 프레임](이미지/실제작업/tvcf_프레임1.png)\n![수집한 영상에서 1초 간격으로 뽑은 프레임](이미지/실제작업/tvcf_프레임2.png)\n*다운로드한 영상의 앞부분을 일정 간격으로 캡처해, 이 장면들을 보고 시네마틱한지 판단했습니다.*\n\n![수집한 레퍼런스 영상 예시](이미지/실제작업/tvcf_레퍼런스.mp4)\n*실제로 수집·통과된 레퍼런스 영상 예시입니다.*\n\n이미 확인한 영상은 목록에 기록해 두었습니다. 덕분에 같은 영상을 다시 받거나 다시 판단하지 않게 할 수 있었습니다. **결과적으로 수백 개 후보가 수십 개의 통과작으로 줄었고, 마지막 선택은 사람이 갤러리에서 직접 했습니다.**\n\n이 작업에서는 브라우저 조작, 영상 추출, 다운로드, 후보 분류, 갤러리 확인이 함께 이어졌습니다. 사용된 도구는 다음과 같습니다:\n\n- Playwright(브라우저 자동 조작 도구)\n- ffmpeg(영상 변환·추출 도구)\n- yt-dlp(영상 다운로드 보조 도구)\n- 서브에이전트(작은 전문 담당 AI)\n- HTML 갤러리\n\n### 4.2 영상 제작 파이프라인: 이미지→영상→음성→조립\n\n광고나 드라마 스타일 영상을 한 편 만든다고 해도, 한 번에 완성본이 나오는 것은 아닙니다. 먼저 시나리오와 컷 구성(장면 단위의 설계)을 잡고, 그다음 제품·캐릭터·배경에 맞는 키 이미지를 만듭니다. 이 이미지를 바탕으로 스토리보드를 잡고, 컷별로 짧은 영상을 생성한 뒤, 음성(TTS, 글을 음성으로 바꾸는 기술)과 배경음악을 붙였습니다.\n\n![키 이미지를 바탕으로 생성한 컷 영상 예시](이미지/실제작업/seedance_컷영상1.mp4)\n![키 이미지를 바탕으로 생성한 컷 영상 예시](이미지/실제작업/seedance_컷영상2.mp4)\n*키 이미지를 바탕으로 컷별로 만든 짧은 영상 예시입니다. 이런 조각들을 모아 한 편으로 조립합니다.*\n\n이 흐름에서 로컬 AI는 단계별로 알맞은 생성 모델을 부르고, 앞 단계 결과를 다음 단계 입력으로 넘기는 역할을 맡았습니다. **핵심은 AI가 직원처럼 일을 이어서 하되, 결재가 필요한 지점에서는 사람이 승인한다는 감각입니다.**\n\n특히 이미지나 영상 생성은 비용이 발생할 수 있습니다. 그래서 모델, 해상도, 화면 비율, 오디오 여부처럼 돈과 품질에 영향을 주는 선택은 실행 전에 사람이 확인했습니다. 마지막에는 음성, 배경음악, 영상 조각을 모아 하나의 결과물로 조립했습니다.\n\n이 파이프라인에는 생성 모델 호출부터 음성, 음악, 영상 조립까지 여러 도구가 연결됐습니다:\n\n- 이미지·영상 생성 모델: GPT-Image-2, Seedance 등(2026-05 기준, 공식 문서 확인 필요)\n- Replicate/CometAPI(생성 모델 호출 서비스)\n- ElevenLabs(TTS)\n- Suno(BGM 생성)\n- ffmpeg(영상 조립)\n\n### 4.3 결과물 셀렉용 HTML 갤러리 만들기\n\n이미지 생성 단계에서는 좋은 컷이 하나만 나오는 것이 아닙니다. 비슷하지만 조금씩 다른 후보가 수십 장씩 생깁니다. 파일 이름만 보고는 어떤 이미지가 좋은지 알기 어렵고, 폴더를 하나씩 열어 보는 방식은 금방 지칩니다.\n\n그래서 로컬 AI에게 권한을 준 작업 폴더 안의 이미지들을 한 화면에 격자로 보여주는 HTML 갤러리를 만들게 했습니다. HTML 갤러리는 브라우저에서 보는 간단한 선택 페이지입니다. **인터넷에 공개하는 배포물이 아니라, 내 컴퓨터에서만 브라우저로 열어 보는 내부 선택판에 가깝습니다.**\n\n마음에 드는 이미지를 클릭하면 선택한 것만 따로 모아지도록 했습니다. 이후 영상 제작에 쓸 베스트 컷만 빠르게 남길 수 있었습니다. 사람은 고르는 일에 집중하고, 정리와 복사는 로컬 AI가 맡은 셈입니다.\n\n이 작업에는 가볍게 화면을 만들고 로컬에서 확인하는 도구들이 쓰였습니다:\n\n- HTML\n- 로컬 HTTP 서버(내 컴퓨터에서 임시로 페이지를 보여주는 장치)\n- 브라우저\n\n### 4.4 인스타그램 카드뉴스·자동 업로드\n\nAI 관련 소식을 모아 인스타그램 카드뉴스로 만들고, 반복적으로 계정에 올리는 흐름도 자동화할 수 있었습니다. 먼저 자료를 수집하고, 그 내용을 여러 장의 카드 이미지로 정리하는 제작 과정을 로컬 AI에게 맡겼습니다.\n\n게시 단계에서는 Meta Graph API(인스타그램 같은 Meta 서비스와 연결하는 공식 API)를 통해 계정에 올리는 흐름으로 이어졌습니다. 댓글이 달리면 웹훅(특정 사건이 생겼을 때 자동으로 알려 주는 연결 방식)을 통해 자동 DM 같은 후속 동작으로 이어지게 했습니다.\n\n**이 작업의 핵심은 수집, 제작, 게시처럼 반복되는 일을 하나의 흐름으로 묶는 데 있습니다.** 다만 API 키와 계정 정보 같은 비밀값은 외부에 노출되지 않도록 별도로 안전하게 관리해야 합니다.\n\n이 흐름에는 자료 수집, 카드 제작, 게시 연동, 후속 자동화가 함께 들어갔습니다:\n\n- 자료 수집 스크립트(정해진 자료를 모으는 자동 작업)\n- HTML/이미지 카드 제작\n- Meta Graph API\n- 웹훅\n\n### 공통점은 반복을 맡기는 방식입니다\n\n이 모든 작업의 공통점은 사람이 큰 방향과 최종 승인을 맡고, 반복·대량 작업은 로컬 AI가 처리했다는 점입니다. 로컬 AI는 혼자 모든 판단을 끝내는 마법 도구라기보다, 권한을 받은 범위 안에서 자료를 모으고 정리하고 실행까지 이어 주는 작업 파트너에 가깝습니다.\n\n영상 크리에이터에게 중요한 것은 도구 이름을 많이 외우는 것이 아닙니다. **“내 작업 중 어떤 반복을 맡길 수 있을까”를 떠올리는 감각이 더 중요합니다.**"}];
  const nav = document.getElementById('nav');
  const content = document.getElementById('content');
  const topnum = document.getElementById('topnum');
  const toptitle = document.getElementById('toptitle');
  const q = document.getElementById('q');
  let active = null;
  function render(list){
    nav.innerHTML = '';
    list.forEach(d=>{
      const el = document.createElement('div');
      el.className = 'item' + (active===d.id?' active':'');
      el.innerHTML = '<span class="badge">'+d.num+'</span><span class="t">'+d.title+'</span>';
      el.onclick = ()=>open(d.id);
      nav.appendChild(el);
    });
  }
  function open(id){
    const d = DOCS.find(x=>x.id===id);
    if(!d) return;
    active = id;
    topnum.textContent = d.num;
    toptitle.textContent = d.title;
    content.innerHTML = marked.parse(d.raw);
    enhanceMedia(content);
    document.querySelector('main').scrollTop = 0;
    render(filtered());
  }
  // mp4 이미지 → video, 연속 이미지 → 그리드
  function enhanceMedia(root){
    // .mp4를 가리키는 img를 video로 교체
    root.querySelectorAll('img').forEach(img=>{
      if(/.(mp4|webm|mov)$/i.test(img.getAttribute('src')||'')){
        const v=document.createElement('video');
        v.src=img.getAttribute('src'); v.controls=true; v.preload='metadata';
        v.playsInline=true; v.muted=true;
        img.replaceWith(v);
      }
    });
    // 연속한 미디어(p 안의 단일 img/video가 줄줄이) → grid로 묶기
    const blocks=[...root.children];
    let i=0;
    while(i<blocks.length){
      const isMedia=el=>el && el.tagName==='P' && el.children.length===1 &&
        (el.children[0].tagName==='IMG'||el.children[0].tagName==='VIDEO') &&
        el.textContent.trim()==='';
      if(isMedia(blocks[i])){
        let j=i; while(isMedia(blocks[j+1])) j++;
        if(j>i){ // 2개 이상 연속 → 그리드
          const grid=document.createElement('div');
          grid.className='media-grid';
          for(let k=i;k<=j;k++){ grid.appendChild(blocks[k].children[0]); }
          blocks[i].replaceWith(grid);
          for(let k=i+1;k<=j;k++){ blocks[k].remove(); }
        }
      }
      i++;
    }
  }
  function filtered(){
    const k = q.value.trim().toLowerCase();
    if(!k) return DOCS;
    return DOCS.filter(d=> (d.title+d.raw).toLowerCase().includes(k));
  }
  q.addEventListener('input', ()=>render(filtered()));
  render(DOCS);
  open(DOCS[0].id);
</script>
